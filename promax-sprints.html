<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رادار عملکرد | راهینو PROMAX</title>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root { 
            --vip-bg: #f8fafc; --vip-surface: #ffffff; --vip-border: #e2e8f0;
            --accent: #8b5cf6; --accent-glow: rgba(139, 92, 246, 0.15);
            --gold: #d97706; --success: #10b981; --danger: #ef4444; --warning: #f59e0b;
            --text-main: #0f172a; --text-muted: #64748b;
        }

        [data-theme="dark"] { 
            --vip-bg: #0f172a; --vip-surface: #1e293b; --vip-border: #334155;
            --gold: #f59e0b; --success: #10b981; --danger: #ef4444; --warning: #f59e0b;
            --text-main: #f8fafc; --text-muted: #94a3b8;
        }

        * { box-sizing: border-box; font-family: 'Vazirmatn', sans-serif; margin: 0; padding: 0; transition: background-color 0.3s, color 0.3s; }
        body { background: var(--vip-bg); color: var(--text-main); line-height: 1.6; padding-bottom: 90px; }
        .app-container { max-width: 800px; margin: 0 auto; padding: 20px; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .nav-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .action-btn { background: var(--vip-surface); border: 1px solid var(--vip-border); width: 45px; height: 45px; border-radius: 14px; display: flex; justify-content: center; align-items: center; text-decoration: none; color: var(--text-main); font-size: 20px; cursor: pointer; }
        .page-title { font-size: 18px; font-weight: 900; display: flex; align-items: center; gap: 8px; }
        .pro-badge { background: linear-gradient(135deg, var(--accent), #6d28d9); color: white; padding: 2px 8px; border-radius: 8px; font-size: 10px; font-weight: 900; letter-spacing: 1px; }

        .tabs-container { display: flex; background: var(--vip-surface); border-radius: 16px; padding: 5px; margin-bottom: 20px; border: 1px solid var(--vip-border); }
        .tab-btn { flex: 1; text-align: center; padding: 12px 5px; font-size: 13px; font-weight: bold; color: var(--text-muted); text-decoration: none; border-radius: 12px; transition: 0.3s; }
        .tab-btn.active { background: var(--accent-glow); color: var(--accent); border: 1px solid rgba(139, 92, 246, 0.3); }

        select.modern-select { width: 100%; padding: 15px; border-radius: 16px; border: 1px solid var(--vip-border); background: var(--vip-surface); color: var(--text-main); font-size: 14px; outline: none; margin-bottom: 20px; font-weight: bold; cursor: pointer; appearance: none; }

        /* علائم حیاتی */
        .vital-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .vital-card { background: var(--vip-surface); border: 1px solid var(--vip-border); border-radius: 16px; padding: 15px 10px; text-align: center; }
        .vital-icon { font-size: 24px; margin-bottom: 5px; display: block; }
        .vital-value { font-size: 18px; font-weight: 900; color: var(--text-main); margin-bottom: 2px; }
        .vital-label { font-size: 10px; color: var(--text-muted); font-weight: bold; }

        /* بوم تحلیل هوش مصنوعی */
        .ai-canvas { background: linear-gradient(135deg, var(--accent-glow), transparent); border: 1px solid var(--accent); border-radius: 20px; padding: 20px; margin-bottom: 20px; position: relative; }
        .ai-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
        .ai-title { font-size: 14px; font-weight: 900; color: var(--accent); }
        .ai-text { font-size: 13px; color: var(--text-main); line-height: 1.8; text-align: justify; }
        .lens-badge { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.1); padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: bold; color: var(--text-muted); }

        /* گرافیک */
        .chart-container { background: var(--vip-surface); border: 1px solid var(--vip-border); border-radius: 20px; padding: 15px; height: 300px; position: relative; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="nav-header">
            <a href="menu.html" class="action-btn">🔙</a>
            <div class="page-title">آزمایشگاه <span class="pro-badge">PROMAX</span></div>
            <button class="action-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
        </div>

        <div class="tabs-container">
            <a href="promax-sprints.html" class="tab-btn">🎯 اسپرینت‌ها و جراحی</a>
            <a href="promax-radar.html" class="tab-btn active">📈 رادار عملکرد</a>
        </div>

        <!-- انتخاب هفته -->
        <div style="position: relative;">
            <select id="weekSelector" class="modern-select" onchange="loadRadarData()">
                <option value="">در حال بارگذاری لیست برنامه‌ها... ⏳</option>
            </select>
            <div style="position: absolute; left: 15px; top: 15px; pointer-events: none;">🔽</div>
        </div>

        <!-- علائم حیاتی -->
        <div class="vital-grid">
            <div class="vital-card">
                <span class="vital-icon">🔥</span>
                <div class="vital-value" id="vitalStreak">--</div>
                <div class="vital-label">زنجیره بیداری</div>
            </div>
            <div class="vital-card">
                <span class="vital-icon">⏱️</span>
                <div class="vital-value" id="vitalAvgHours">-- <span style="font-size:10px;">ساعت</span></div>
                <div class="vital-label">میانگین مطالعه</div>
            </div>
            <div class="vital-card">
                <span class="vital-icon">⚠️</span>
                <div class="vital-value" id="vitalEscape" style="color: var(--danger);">--</div>
                <div class="vital-label">باکس‌های فراری</div>
            </div>
        </div>

        <!-- بوم تحلیل هوش مصنوعی -->
        <div class="ai-canvas" id="aiCanvas">
            <div class="lens-badge" id="lensType">لنز: --</div>
            <div class="ai-header">
                <span style="font-size: 24px;">🧠</span>
                <span class="ai-title">تحلیل استراتژیک قطب‌نما:</span>
            </div>
            <div class="ai-text" id="aiAnalysisText">
                لطفاً یک هفته را از منوی بالا انتخاب کنید تا پرونده‌ی شما کالبدشکافی شود.
            </div>
        </div>

        <!-- گرافیک رادار -->
        <div class="chart-container">
            <canvas id="performanceChart"></canvas>
        </div>
    </div>

    <script>
        // تنظیمات اتصال
        const SUPABASE_URL = 'https://etlutqwwqeahevsskjih.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0bHV0cXd3cWVhaGV2c3NramloIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MTYwNjIsImV4cCI6MjA5NzE5MjA2Mn0.kXvSQtGM7w28IffQ4JOtv_xtHenyDV0tC70bOd7N7nQ'; 
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        const userId = localStorage.getItem('national_id') || localStorage.getItem('qotbnama_user_id') || localStorage.getItem('chat_id');

        let myChart = null;
        let allSchedules = [];

        // 🌓 تم
        const themeBtn = document.getElementById('themeBtn');
        const currentTheme = localStorage.getItem('theme') || 'dark';
        if (currentTheme === 'dark') { document.documentElement.setAttribute('data-theme', 'dark'); themeBtn.innerText = '☀️'; Chart.defaults.color = '#94a3b8'; } 
        else { themeBtn.innerText = '🌙'; Chart.defaults.color = '#64748b'; }

        Chart.defaults.font.family = 'Vazirmatn';

        function toggleTheme() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            if (isDark) { document.documentElement.removeAttribute('data-theme'); localStorage.setItem('theme', 'light'); themeBtn.innerText = '🌙'; Chart.defaults.color = '#64748b'; } 
            else { document.documentElement.setAttribute('data-theme', 'dark'); localStorage.setItem('theme', 'dark'); themeBtn.innerText = '☀️'; Chart.defaults.color = '#94a3b8'; }
            if(myChart) myChart.update();
        }

        window.onload = async function() {
            if(!userId) { alert("خطای هویت!"); return; }
            await loadSchedulesDropdown();
        };

        // ۱. دریافت لیست برنامه‌های گذشته برای پر کردن دراپ‌داون
        async function loadSchedulesDropdown() {
            const { data, error } = await supabaseClient
                .from('ai_schedules')
                .select('id, week_label, target_start_date, raw_plan, created_at')
                .eq('national_id', String(userId))
                .order('created_at', { ascending: false });

            const select = document.getElementById('weekSelector');
            select.innerHTML = '<option value="">یک هفته را برای آنالیز انتخاب کنید...</option>';

            if (data && data.length > 0) {
                allSchedules = data;
                data.forEach(sch => {
                    let opt = document.createElement('option');
                    opt.value = sch.id;
                    opt.innerText = sch.week_label || 'برنامه بدون نام';
                    select.appendChild(opt);
                });
            } else {
                select.innerHTML = '<option value="">هیچ پرونده‌ای یافت نشد.</option>';
            }
        }

        // ۲. جادوی اصلی: لود کردن دیتای رادار بر اساس هفته انتخابی
        async function loadRadarData() {
            const scheduleId = document.getElementById('weekSelector').value;
            if(!scheduleId) return;

            const selectedPlan = allSchedules.find(s => s.id == scheduleId);
            let rawPlan = typeof selectedPlan.raw_plan === 'string' ? JSON.parse(selectedPlan.raw_plan) : selectedPlan.raw_plan;

            // محاسبه تعداد "باکس‌های فراری" (باکس‌هایی که شیفت شدن یا رفتن رو نیمکت)
            let escapeCount = rawPlan.filter(p => p.status === 'shifted' || p.day === 'bench').length;
            document.getElementById('vitalEscape').innerText = escapeCount;

            // مشخص کردن تاریخ ابتدا و انتهای این برنامه برای واکشی گزارش‌ها
            let startDate = new Date(selectedPlan.target_start_date || selectedPlan.created_at);
            let endDate = new Date(startDate);
            endDate.setDate(endDate.getDate() + 6);

            // واکشی گزارش‌های روزانه این هفته
            const { data: reports } = await supabaseClient
                .from('daily_reports')
                .select('*')
                .eq('chat_id', String(userId))
                .gte('report_date', startDate.toISOString())
                .lte('report_date', endDate.toISOString());

            let totalStudy = 0;
            let reportDays = reports ? reports.length : 0;
            let dailyHoursArr = [0,0,0,0,0,0,0]; // شنبه تا جمعه

            if (reports && reportDays > 0) {
                reports.forEach(r => {
                    let dTime = 0;
                    if(r.courses) {
                        r.courses.forEach(c => { dTime += (c.edu || 0) + (c.study || 0); });
                    }
                    totalStudy += dTime;
                    
                    // استخراج روز هفته (0=یکشنبه، 6=شنبه) برای نمودار
                    let rDay = new Date(r.report_date).getDay();
                    let faIndex = (rDay + 1) % 7; // تبدیل به فرمت ایرانی
                    dailyHoursArr[faIndex] = dTime;
                });
                document.getElementById('vitalAvgHours').innerHTML = (totalStudy / reportDays).toFixed(1) + ' <span style="font-size:10px;">ساعت</span>';
            } else {
                document.getElementById('vitalAvgHours').innerText = '0';
            }

            // گرفتن زنجیره بیداری
            const { data: stData } = await supabaseClient.from('students').select('wake_streak').eq('national_id', String(userId)).single();
            document.getElementById('vitalStreak').innerText = stData ? (stData.wake_streak || 0) : 0;

            // تشخیص لنز: آیا این برنامه مال هفته آزمون بوده؟ (فرض: اگر لیبلش کلمه "آزمون" رو داره، هفته دومه)
            let isExamWeek = selectedPlan.week_label && selectedPlan.week_label.includes("آزمون");

            if (isExamWeek) {
                // لنز کالبدشکافی (رادار)
                document.getElementById('lensType').innerText = 'لنز: کالبدشکافی آزمون 🎯';
                document.getElementById('lensType').style.color = 'var(--gold)';
                document.getElementById('aiAnalysisText').innerHTML = `
                    <span style="color:var(--text-muted);">تحلیل هوش مصنوعی:</span><br>
                    <strong>وضعیت قرمز!</strong> بر اساس دیتاهای استخراج شده، شما در درس <em>فیزیک</em> بیش از ۱۲ ساعت سرمایه‌گذاری زمانی داشتید اما درصد آزمون زیر ۳۰٪ بوده است. این تضاد نشان‌دهنده «توهم یادگیری» و ضعف در تست‌زنی پوششی است.
                    باکس‌های فراری شما (${escapeCount} عدد) به شدت روی یکپارچگی این اسپرینت تاثیر منفی گذاشته است.
                `;
                
                // در اینجا باید دیتای کارنامه رو از دیتابیس بگیریم. برای دمو دیتای فرضی میدیم
                drawRadarChart(['فیزیک', 'ریاضی', 'شیمی', 'زیست', 'ادبیات'], [12, 8, 10, 14, 4], [30, 60, 45, 80, 70]);

            } else {
                // لنز پیشروی (نمودار میله‌ای)
                document.getElementById('lensType').innerText = 'لنز: پیشروی و استقامت 🏃';
                document.getElementById('lensType').style.color = 'var(--success)';
                document.getElementById('aiAnalysisText').innerHTML = `
                    <span style="color:var(--text-muted);">تحلیل هوش مصنوعی:</span><br>
                    در این هفته استقامت شما در روزهای ابتدایی هفته عالی بوده است، اما نمودار زیر نشان می‌دهد که در روز سه‌شنبه و چهارشنبه دچار افت انرژی شدیدی شده‌اید.
                    به نظر می‌رسد برنامه‌ی کلاس‌های مدرسه در این روزها شما را فرسوده می‌کند. پیشنهاد می‌کنم در استراتژی هفته بعد، حجم دروس این دو روز را کاهش دهید.
                `;
                
                drawBarChart(['شنبه', 'یکشنبه', 'دوشنبه', 'سه‌شنبه', 'چهارشنبه', 'پنجشنبه', 'جمعه'], dailyHoursArr);
            }
        }

        // ==========================================
        // 📊 موتور رسم نمودارهای هوشمند
        // ==========================================
        function destroyChart() { if (myChart) myChart.destroy(); }

        function drawBarChart(labels, data) {
            destroyChart();
            const ctx = document.getElementById('performanceChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'ساعت مطالعه روزانه',
                        data: data,
                        backgroundColor: 'rgba(139, 92, 246, 0.5)',
                        borderColor: '#8b5cf6',
                        borderWidth: 1,
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: { y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' } }, x: { grid: { display: false } } },
                    plugins: { legend: { display: false } }
                }
            });
        }

        function drawRadarChart(labels, studyHours, examPercents) {
            destroyChart();
            // نرمال‌سازی ساعت مطالعه برای قرار گرفتن روی مقیاس ۰ تا ۱۰۰ (برای مقایسه زیباتر با درصدها)
            let maxHours = Math.max(...studyHours) || 1;
            let normalizedHours = studyHours.map(h => Math.round((h / maxHours) * 100));

            const ctx = document.getElementById('performanceChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'تلاش (ساعت مطالعه)',
                            data: normalizedHours,
                            backgroundColor: 'rgba(59, 130, 246, 0.2)',
                            borderColor: '#3b82f6',
                            pointBackgroundColor: '#3b82f6',
                            borderWidth: 2
                        },
                        {
                            label: 'نتیجه (درصد آزمون)',
                            data: examPercents,
                            backgroundColor: 'rgba(245, 158, 11, 0.2)',
                            borderColor: '#f59e0b',
                            pointBackgroundColor: '#f59e0b',
                            borderWidth: 2
                        }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: { r: { angleLines: { color: 'rgba(255,255,255,0.1)' }, grid: { color: 'rgba(255,255,255,0.1)' }, pointLabels: { font: { size: 12 } }, ticks: { display: false } } },
                    plugins: { legend: { position: 'bottom' } }
                }
            });
        }
    </script>
</body>
</html>
