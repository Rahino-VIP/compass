<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>آزمایشگاه قطب‌نما | راهینو VIP</title>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> 
    <style>
        :root { 
            --bg-dark: #0f172a; --surface-dark: #1e293b; --surface-light: #334155; --border-color: #475569;
            --accent: #8b5cf6; --accent-glow: rgba(139, 92, 246, 0.2); --gold: #f59e0b;
            --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
            --text-main: #f8fafc; --text-muted: #94a3b8;
        }

        [data-theme="light"] {
            --bg-dark: #f8fafc; --surface-dark: #ffffff; --surface-light: #e2e8f0; --border-color: #cbd5e1;
            --text-main: #0f172a; --text-muted: #64748b;
        }

        * { box-sizing: border-box; font-family: 'Vazirmatn', sans-serif; margin: 0; padding: 0; transition: background-color 0.3s, color 0.3s;}
        body { background: var(--bg-dark); color: var(--text-main); line-height: 1.6; padding-bottom: 90px; }
        
        .app-container { max-width: 800px; margin: 0 auto; padding: 20px; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .nav-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-back { background: var(--surface-light); border: 1px solid var(--border-color); color: var(--text-main); width: 45px; height: 45px; border-radius: 14px; display: flex; justify-content: center; align-items: center; text-decoration: none; font-size: 20px; cursor: pointer;}
        .page-title { font-size: 18px; font-weight: 900; display: flex; align-items: center; gap: 8px; color: var(--text-main); }
        .pro-badge { background: linear-gradient(135deg, var(--accent), #6d28d9); color: white; padding: 2px 8px; border-radius: 8px; font-size: 10px; font-weight: 900; letter-spacing: 1px; }

        .tabs-container { display: flex; background: var(--surface-dark); border-radius: 16px; padding: 5px; margin-bottom: 25px; border: 1px solid var(--border-color); }
        .tab-btn { flex: 1; text-align: center; padding: 12px 5px; font-size: 13px; font-weight: bold; color: var(--text-muted); text-decoration: none; border-radius: 12px; transition: 0.3s; }
        .tab-btn.active { background: var(--accent-glow); color: var(--accent); border: 1px solid rgba(139, 92, 246, 0.3); }

        .dossier-list { display: flex; flex-direction: column; gap: 15px; }
        .dossier-card { background: var(--surface-dark); border: 1px solid var(--border-color); border-radius: 16px; overflow: hidden; transition: 0.3s; }
        .dossier-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; background: rgba(255,255,255,0.02); }
        .dossier-header:hover { background: rgba(255,255,255,0.05); }
        
        .dossier-info h3 { font-size: 15px; color: var(--text-main); margin-bottom: 5px; }
        .dossier-dates { font-size: 11px; color: var(--text-muted); }
        .dossier-badge { font-size: 11px; padding: 4px 10px; border-radius: 20px; font-weight: bold; }
        .badge-exam { background: rgba(245, 158, 11, 0.1); color: var(--gold); border: 1px solid rgba(245, 158, 11, 0.3); }
        .badge-routine { background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.3); }

        .dossier-body { padding: 0 20px; max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out, padding 0.4s ease-out; background: var(--bg-dark); border-top: 1px dashed transparent; }
        .dossier-card.open .dossier-body { max-height: 2500px; padding: 20px; border-top-color: var(--border-color); }

        .lock-screen { text-align: center; padding: 30px 10px; display: none; }
        .lock-icon { font-size: 40px; margin-bottom: 15px; filter: drop-shadow(0 0 10px rgba(239,68,68,0.5)); }
        
        .surgery-form { display: none; }
        .file-upload-wrapper { position: relative; width: 100%; height: 100px; border: 2px dashed var(--accent); border-radius: 16px; display: flex; flex-direction: column; justify-content: center; align-items: center; background: var(--accent-glow); margin-bottom: 15px; cursor: pointer; transition: 0.3s; }
        .file-upload-wrapper:hover { background: rgba(139, 92, 246, 0.25); }
        .file-upload-wrapper input[type="file"] { position: absolute; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        
        textarea.modern-input { width: 100%; padding: 15px; border-radius: 16px; border: 1px solid var(--border-color); background: rgba(0,0,0,0.2); color: var(--text-main); font-size: 13px; resize: none; outline: none; margin-bottom: 15px; transition: 0.3s; }
        textarea.modern-input:focus { border-color: var(--accent); }

        .btn-submit { background: linear-gradient(135deg, var(--accent), #6d28d9); color: white; width: 100%; padding: 15px; border-radius: 12px; border: none; font-size: 14px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        
        .loader { display: none; text-align: center; padding: 20px; }
        .spinner { font-size: 30px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .ai-analysis-box { background: rgba(139, 92, 246, 0.05); border: 1px solid rgba(139, 92, 246, 0.3); border-radius: 16px; padding: 20px; margin-top: 15px; line-height: 1.8; font-size: 14px; }
        .chart-container { position: relative; height: 250px; width: 100%; margin-top: 20px; background: var(--surface-dark); padding: 10px; border-radius: 16px; border: 1px solid var(--border-color); }
        
        /* استایل سوئیچ آزمون */
        .toggle-row { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.1); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid var(--border-color); cursor: pointer;}
        .toggle-switch { position: relative; width: 44px; height: 24px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--border-color); transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--success); }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="nav-header">
            <a href="menu.html" class="btn-back">🔙</a>
            <div class="page-title">آزمایشگاه <span class="pro-badge">PROMAX</span></div>
            <button class="btn-back" onclick="toggleTheme()" id="themeBtn">🌙</button>
        </div>

        <div class="tabs-container">
            <a href="promax-sprints.html" class="tab-btn active">🎯 پرونده‌ها و جراحی</a>
            <a href="promax-radar.html" class="tab-btn">📈 رادار عملکرد کلی</a>
        </div>

        <p style="font-size: 12px; color: var(--text-muted); margin-bottom: 20px; text-align: center; background: var(--surface-dark); padding: 10px; border-radius: 10px; border: 1px solid var(--border-color);">
            برای انجام تحلیل توسط هوش مصنوعی، باید حداقل <span style="color:var(--gold); font-weight:bold;">۶ گزارش شبانه</span> در آن هفته ثبت کرده باشید.
        </p>

        <div class="dossier-list" id="dossiersContainer">
            <div style="text-align:center; padding: 30px; color: var(--text-muted);">در حال استخراج پرونده‌های شما از سرور... ⏳</div>
        </div>
    </div>

    <script>
        const userId = localStorage.getItem('national_id') || localStorage.getItem('qotbnama_user_id') || localStorage.getItem('chat_id');
        
        const SUPABASE_URL = 'https://etlutqwwqeahevsskjih.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0bHV0cXd3cWVhaGV2c3NramloIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MTYwNjIsImV4cCI6MjA5NzE5MjA2Mn0.kXvSQtGM7w28IffQ4JOtv_xtHenyDV0tC70bOd7N7nQ'; 
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyUy08rtBxcRePHokg_FT0s_8e6Qj5Y1CcQXE5F_H0oX5VTvO7VhCs_KTfRp6xlKtynbA/exec';

        let selectedFileBase64 = {};
        let selectedMimeType = {};
        let chartInstances = {}; 

        Chart.defaults.color = '#94a3b8';
        Chart.defaults.font.family = 'Vazirmatn';

        // 🌓 سیستم تم
        const themeBtn = document.getElementById('themeBtn');
        const currentTheme = localStorage.getItem('theme') || 'dark';
        if (currentTheme === 'light') { document.documentElement.setAttribute('data-theme', 'light'); themeBtn.innerText = '🌙'; }

        function toggleTheme() {
            const isLight = document.documentElement.getAttribute('data-theme') === 'light';
            if (isLight) { document.documentElement.removeAttribute('data-theme'); localStorage.setItem('theme', 'dark'); themeBtn.innerText = '☀️'; } 
            else { document.documentElement.setAttribute('data-theme', 'light'); localStorage.setItem('theme', 'light'); themeBtn.innerText = '🌙'; }
        }

        // 🌟 مترجم ضدگلوله‌ی تاریخ میلادی به شمسیِ استاندارد دیتابیس (YYYY/MM/DD)
        function getShamsiForDB(dateObj) {
            let formatter = new Intl.DateTimeFormat('en-US-u-ca-persian', { year: 'numeric', month: '2-digit', day: '2-digit' });
            let parts = formatter.formatToParts(dateObj);
            let y = parts.find(p => p.type === 'year').value;
            let m = parts.find(p => p.type === 'month').value;
            let d = parts.find(p => p.type === 'day').value;
            
            // ۱. اجبار به دو رقمی بودن ماه و روز (اگر یک رقمی بود، صفر بچسبون پشتش)
            m = m.toString().padStart(2, '0');
            d = d.toString().padStart(2, '0');
            
            // ۲. ترکیب با اسلش دقیقاً مثل دیتابیس
            let dateStr = `${y}/${m}/${d}`;
            
            // ۳. فیلتر امنیتی: تبدیل اجباری اعداد فارسی به انگلیسی (برای اطمینان ۱۰۰٪)
            dateStr = dateStr.replace(/[۰-۹]/g, c => '۰۱۲۳۴۵۶۷۸۹'.indexOf(c));
            
            return dateStr;
        }

        window.onload = async function() { 
            if(!userId) { alert('خطای احراز هویت'); return; }
            await loadDossiers(); 
        };

        // 🌟 خواندن برنامه‌ها (پرونده‌ها) از جدول واقعی ai_schedules
        async function loadDossiers() {
            const container = document.getElementById('dossiersContainer');
            const nowIso = new Date().toISOString();
            
            const { data: schedules, error } = await supabaseClient
                .from('ai_schedules')
                .select('id, week_label, target_start_date, created_at')
                .eq('national_id', String(userId))
                .eq('status', 'approved')
                .lte('target_start_date', nowIso) // فقط برنامه‌هایی که شروع شدن
                .order('target_start_date', { ascending: false })
                .limit(5);

            if (error || !schedules || schedules.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:30px; color:var(--text-muted);">هنوز پرونده آموزشی فعالی برای شما ثبت نشده است.</div>';
                return;
            }

            container.innerHTML = ''; 

            schedules.forEach(sch => {
                let sDate = new Date(sch.target_start_date || sch.created_at);
                let eDate = new Date(sDate);
                eDate.setDate(sDate.getDate() + 6);
                
                let startStr = getShamsiForDB(sDate);
                let endStr = getShamsiForDB(eDate);

                let faOpt = { month: 'long', day: 'numeric' };
                let shamsiStart = new Intl.DateTimeFormat('fa-IR', faOpt).format(sDate);
                let shamsiEnd = new Intl.DateTimeFormat('fa-IR', faOpt).format(eDate);

                // 🧠 تشخیص اتوماتیک هوش مصنوعی: آیا این فازِ منتهی به آزمونه؟
                let aiMots = typeof sch.ai_motivations === 'string' ? JSON.parse(sch.ai_motivations) : (sch.ai_motivations || {});
                let weeklyMsg = aiMots.weekly_motivation || "";
                // اگر تو پیام انگیزشی کلمه "هفته دوم" یا "آزمون" بود، یعنی باید کارنامه بده
                let isExamWeek = weeklyMsg.includes("هفته دوم") || weeklyMsg.includes("آزمون");

                let badge = isExamWeek 
                    ? `<span class="dossier-badge badge-exam">🎯 هدف: کالبدشکافی آزمون</span>` 
                    : `<span class="dossier-badge badge-routine">🏃 فاز پیشروی</span>`;

                container.innerHTML += `
                    <div class="dossier-card" id="card_${sch.id}">
                        <div class="dossier-header" onclick="toggleDossier('${sch.id}', '${startStr}', '${endStr}', ${isExamWeek})">
                            <div class="dossier-info">
                                <h3>${sch.week_label || 'پرونده بدون نام'}</h3>
                                <div class="dossier-dates">${shamsiStart} الی ${shamsiEnd}</div>
                            </div>
                            <div>${badge}</div>
                        </div>
                        
                        <div class="dossier-body">
                            <div id="loader_${sch.id}" class="loader">
                                <div class="spinner">⏳</div>
                                <div style="font-size:11px; margin-top:10px;">در حال بررسی بایگانی گزارش‌های شما...</div>
                            </div>

                            <div id="lock_${sch.id}" class="lock-screen">
                                <div class="lock-icon">⛔</div>
                                <h4 style="color:var(--danger); margin-bottom:5px;">دسترسی مسدود شد</h4>
                                <p style="font-size:12px; color:var(--text-muted);" id="lock_msg_${sch.id}"></p>
                            </div>

                            <div id="form_${sch.id}" class="surgery-form">
                                
                                <!-- پیام هوشمند تشخیص فاز -->
                                ${isExamWeek ? `
                                    <div style="background: rgba(245, 158, 11, 0.1); border: 1px solid var(--warning); padding: 12px; border-radius: 12px; margin-bottom: 15px; font-size: 12px; color: var(--warning);">
                                        🎯 <strong>تشخیص خودکار:</strong> این هفته منتهی به آزمون است. لطفاً کارنامه خود را آپلود کنید تا کل این فاز (۱۴ روز اخیر) ارزیابی شود.
                                    </div>
                                    <div id="uploadBox_${sch.id}" class="file-upload-wrapper">
                                        <div style="font-size: 24px; margin-bottom: 5px;">📥</div>
                                        <div style="font-size: 11px; font-weight: bold; color: var(--accent);" id="fileName_${sch.id}">کارنامه (PDF یا عکس) را اینجا آپلود کنید</div>
                                        <input type="file" accept="image/*, application/pdf" onchange="handleFileSelect(this, '${sch.id}')">
                                    </div>
                                ` : `
                                    <div style="background: rgba(16, 185, 129, 0.1); border: 1px solid var(--success); padding: 12px; border-radius: 12px; margin-bottom: 15px; font-size: 12px; color: var(--success);">
                                        🏃 <strong>تشخیص خودکار:</strong> این هفته آزمون ندارید. سیستم کیفیت مطالعه و تعهد به برنامه را در این ۷ روز تحلیل می‌کند.
                                    </div>
                                `}
                                
                                <textarea class="modern-input" id="reflection_${sch.id}" rows="3" placeholder="اعترافات: در این فاز چه حسی داشتی؟ نقطه قوت و ضعفت چی بود؟"></textarea>
                                <button class="btn-submit" id="btn_${sch.id}" onclick="submitAnalysis('${sch.id}', '${startStr}', '${endStr}', ${isExamWeek})">🚀 ارسال به آزمایشگاه</button>
                            </div>
                            
                            <div id="pending_${sch.id}" style="display:none; text-align:center; padding:20px; background:rgba(59,130,246,0.1); border:1px solid #3b82f6; border-radius:12px; margin-top:10px;">
                                <h4 style="color:#3b82f6; margin-bottom:5px;">⏳ پرونده در دستِ مشاور است</h4>
                                <p style="font-size:11px; color:var(--text-muted);">تحلیل شما در صف بررسی است و به زودی اینجا نمایان می‌شود.</p>
                            </div>

                            <div id="approved_result_${sch.id}" style="display:none;">
                                <div style="display:flex; align-items:center; gap:8px; margin-bottom: 10px; color:var(--success); font-weight:bold;">
                                    <span>✅</span> نتیجه جراحی هوش مصنوعی:
                                </div>
                                <div class="ai-analysis-box" id="analysis_text_${sch.id}"></div>
                                
                                <div id="chartBox_${sch.id}" class="chart-container" style="display:none;">
                                    <canvas id="chart_${sch.id}"></canvas>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
        }
        function toggleExamUpload(id) {
            const isChecked = document.getElementById(`hasExam_${id}`).checked;
            document.getElementById(`uploadBox_${id}`).style.display = isChecked ? 'flex' : 'none';
        }

        async function toggleDossier(id, startDateStr, endDateStr, isExamWeek) {
            const card = document.getElementById(`card_${id}`);
            const isOpen = card.classList.contains('open');
            
            document.querySelectorAll('.dossier-card').forEach(c => c.classList.remove('open'));

            if (!isOpen) {
                card.classList.add('open');
                
                document.getElementById(`loader_${id}`).style.display = 'block';
                document.getElementById(`lock_${id}`).style.display = 'none';
                document.getElementById(`form_${id}`).style.display = 'none';
                document.getElementById(`pending_${id}`).style.display = 'none';
                document.getElementById(`approved_result_${id}`).style.display = 'none';

                // ۱. بررسی اینکه آیا قبلاً ثبت شده یا نه (در جدول exam_results که حالا نقش پرونده رو داره)
                const { data: existingAnalysis } = await supabaseClient
                    .from('exam_results')
                    .select('status, consultant_analysis, extracted_data')
                    .eq('chat_id', String(userId))
                    .eq('period_start', startDateStr)
                    .eq('period_end', endDateStr)
                    .order('created_at', { ascending: false })
                    .limit(1);

                if (existingAnalysis && existingAnalysis.length > 0) {
                    const status = existingAnalysis[0].status;
                    document.getElementById(`loader_${id}`).style.display = 'none';
                    
                    if (status === 'pending') {
                        document.getElementById(`pending_${id}`).style.display = 'block';
                        return; 
                    } else if (status === 'approved') {
                        document.getElementById(`approved_result_${id}`).style.display = 'block';
                        document.getElementById(`analysis_text_${id}`).innerHTML = existingAnalysis[0].consultant_analysis || 'متن تحلیل دریافت نشد.';
                        
                        if (existingAnalysis[0].extracted_data) {
                            document.getElementById(`chartBox_${id}`).style.display = 'block';
                            renderDossierChart(id, existingAnalysis[0].extracted_data);
                        }
                        return; 
                    } else if (status === 'rejected') {
                        document.getElementById(`lock_${id}`).style.display = 'block';
                        document.getElementById(`lock_${id}`).innerHTML = `<h4 style="color:var(--danger);">⚠️ کارنامه ناخوانا بود یا اطلاعات ناقص است.</h4><p style="font-size:11px;color:var(--text-muted);">لطفاً در نوبت بعدی با دقت بیشتری ارسال کنید.</p>`;
                    }
                }

                console.log("🕵️‍♂️ دیتابیس رو بگرد از تاریخ: " + startDateStr + " تا تاریخ: " + endDateStr);
                
                // ۲. بررسی قانون 6 روز گزارش
                const { count, error } = await supabaseClient
                    .from('daily_reports')
                    .select('*', { count: 'exact', head: true })
                    .eq('chat_id', String(userId))
                    .gte('report_date', startDateStr)
                    .lte('report_date', endDateStr);

                document.getElementById(`loader_${id}`).style.display = 'none';

                if (count >= 6) {
                    document.getElementById(`form_${id}`).style.display = 'block';
                } else {
                    document.getElementById(`lock_${id}`).style.display = 'block';
                    document.getElementById(`lock_msg_${id}`).innerText = `شما در این هفته تنها ${count || 0} گزارش شبانه ثبت کرده‌اید. برای آنالیز دقیق و جلوگیری از خطای هوش مصنوعی، نیاز به حداقل ۶ روز دیتا است.`;
                }
            }
        }

        function renderDossierChart(id, extractedData) {
            let parsedData = typeof extractedData === 'string' ? JSON.parse(extractedData) : extractedData;
            if (!parsedData || parsedData.length === 0) return;

            const labels = parsedData.map(l => l.name);
            const corrects = parsedData.map(l => Number(l.correct || 0));
            const incorrects = parsedData.map(l => Number(l.incorrect || 0));
            const unattempteds = parsedData.map(l => Number(l.unattempted || 0));

            if (chartInstances[id]) chartInstances[id].destroy(); 

            const ctx = document.getElementById(`chart_${id}`).getContext('2d');
            chartInstances[id] = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'درست', data: corrects, backgroundColor: '#10b981', borderRadius: 4 },
                        { label: 'غلط', data: incorrects, backgroundColor: '#ef4444', borderRadius: 4 },
                        { label: 'نزده', data: unattempteds, backgroundColor: '#475569', borderRadius: 4 }
                    ]
                },
                options: { 
                    responsive: true, maintainAspectRatio: false, 
                    scales: { 
                        x: { stacked: true, grid: { display: false } }, 
                        y: { stacked: true, grid: { color: 'rgba(255,255,255,0.05)' } } 
                    },
                    plugins: { legend: { position: 'bottom' } }
                }
            });
        }

        function handleFileSelect(input, id) {
            if (input.files && input.files[0]) {
                const file = input.files[0];
                document.getElementById(`fileName_${id}`).innerText = "✅ " + file.name;
                selectedMimeType[id] = file.type; 
                
                const reader = new FileReader();
                reader.onload = function(e) { selectedFileBase64[id] = e.target.result.split(',')[1]; };
                reader.readAsDataURL(file);
            }
        }

        async function submitAnalysis(id, startDate, endDate, isExamWeek) {
            const hasExam = document.getElementById(`hasExam_${id}`).checked;
            const reflection = document.getElementById(`reflection_${id}`).value.trim();
            
            if (hasExam && !selectedFileBase64[id]) { alert("لطفاً کارنامه (عکس یا PDF) خود را آپلود کنید!"); return; }
            if (reflection.length < 10) { alert("لطفاً حداقل یک خط اعتراف و توضیح بنویس!"); return; }

            const btn = document.getElementById(`btn_${id}`);
            btn.innerHTML = 'در حال پرواز به سمت سرور... ⏳'; btn.disabled = true;

            try {
                // ارسال بصورت no-cors برای جلوگیری از ارور قرمز مرورگر (فقط ارسال و فراموشی)
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ 
                        action: 'analyze_period', // نام اکشن رو آپدیت کردیم
                        student_id: userId, 
                        start_date: startDate, 
                        end_date: endDate, 
                        has_exam: hasExam, 
                        reflection: reflection, 
                        mime_type: hasExam ? selectedMimeType[id] : null, 
                        file_base64: hasExam ? selectedFileBase64[id] : null 
                    })
                });
                
                document.getElementById(`form_${id}`).style.display = 'none';
                document.getElementById(`pending_${id}`).style.display = 'block';
                
            } catch (err) {
                alert("خطا در ارتباط با سرور!");
                btn.innerHTML = '🚀 ارسال مجدد'; btn.disabled = false;
            }
        }
    </script>
</body>
</html>
