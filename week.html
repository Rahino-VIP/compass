<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقویم هفته | قطب‌نما</title>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { --vip-bg: #f8fafc; --vip-surface: #ffffff; --vip-border: #e2e8f0; --gold: #d97706; --success: #10b981; --danger: #ef4444; --text-main: #0f172a; --text-muted: #64748b; }
        [data-theme="dark"] { --vip-bg: #0f172a; --vip-surface: #1e293b; --vip-border: #334155; --gold: #f59e0b; --success: #10b981; --danger: #ef4444; --text-main: #f8fafc; --text-muted: #94a3b8; }
        
        * { box-sizing: border-box; font-family: 'Vazirmatn', sans-serif; margin: 0; padding: 0; transition: background-color 0.3s, color 0.3s; }
        body { background: var(--vip-bg); color: var(--text-main); line-height: 1.6; padding-bottom: 90px; }
        .app-container { max-width: 800px; margin: 0 auto; padding: 20px; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .theme-toggle { background: var(--vip-surface); border: 1px solid var(--vip-border); color: var(--text-main); width: 45px; height: 45px; border-radius: 14px; cursor: pointer; font-size: 20px; display: flex; justify-content: center; align-items: center; }

        .nav-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .action-btn { background: var(--vip-surface); border: 1px solid var(--vip-border); width: 45px; height: 45px; border-radius: 14px; display: flex; justify-content: center; align-items: center; text-decoration: none; color: var(--text-main); font-size: 20px; }
        .page-title { font-size: 16px; font-weight: 900; color: var(--gold); text-align: center; }
        select.week-selector { background: var(--vip-surface); border: 1px solid var(--vip-border); color: var(--text-muted); padding: 5px; border-radius: 8px; outline: none; font-size: 11px; margin-top: 5px; cursor: pointer; }

        .tabs-container { display: flex; background: var(--vip-surface); border-radius: 16px; padding: 5px; margin-bottom: 25px; border: 1px solid var(--vip-border); }
        .tab-btn { flex: 1; text-align: center; padding: 12px 2px; font-size: 13px; font-weight: bold; color: var(--text-muted); text-decoration: none; border-radius: 12px; transition: 0.3s; }
        .tab-btn.active { background: var(--gold); color: #000; box-shadow: 0 5px 15px rgba(245, 158, 11, 0.3); }

        /* تقویم گرافیکی Flex */
        .gcal-wrapper { overflow-x: auto; background: var(--vip-surface); border-radius: 16px; border: 1px solid var(--vip-border); direction: rtl; }
        .gcal-container { display: flex; min-width: 850px; background: var(--vip-bg); position: relative; }
        .gcal-time-col { width: 50px; flex-shrink: 0; border-left: 1px solid var(--vip-border); background: var(--vip-surface); position: sticky; right: 0; z-index: 10; }
        .gcal-time-header { height: 45px; border-bottom: 1px solid var(--vip-border); display: flex; justify-content: center; align-items: center; font-size: 11px; font-weight: bold; color: var(--gold); }
        .gcal-time-slot { height: 60px; border-bottom: 1px dashed var(--vip-border); font-size: 10px; color: var(--text-muted); text-align: center; padding-top: 5px; font-family: monospace; }
        .gcal-day-col { flex: 1; border-left: 1px solid var(--vip-border); position: relative; min-width: 110px; }
        .gcal-day-header { height: 45px; border-bottom: 1px solid var(--vip-border); display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 12px; font-weight: bold; background: var(--vip-surface); position: sticky; top: 0; z-index: 9; }
        .gcal-day-date { font-size: 9px; color: var(--text-muted); font-weight: normal; }
        .gcal-day-grid { position: relative; height: 1080px; background-image: linear-gradient(to bottom, transparent 59px, var(--vip-border) 60px); background-size: 100% 60px; }
        .gcal-event { position: absolute; left: 4px; right: 4px; border-radius: 6px; padding: 6px; font-size: 10px; color: white; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.3); border-right: 3px solid rgba(255,255,255,0.4); z-index: 5; }
        .gcal-event.completed { opacity: 0.5; background: var(--success) !important; border-right-color: rgba(255,255,255,0.2); }
        .gcal-event.shifted { opacity: 0.4; background: var(--danger) !important; text-decoration: line-through; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="nav-header">
            <a href="menu.html" class="action-btn">🔙</a>
            <div class="page-title">
                قطب‌نمای راهینو
                <br><select id="weekSelector" class="week-selector" onchange="changeWeek(this.value)"></select>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>
                <a href="vip-setup.html" class="action-btn">⚙️</a>
            </div>
        </div>

        <div class="tabs-container">
            <a href="schedule.html" class="tab-btn">🎯 عملیات امروز</a>
            <a href="week.html" class="tab-btn active">🗓️ تقویم هفته</a>
            <a href="request.html" class="tab-btn">🎁 اتاق فکر</a>
        </div>

        <div class="gcal-wrapper">
            <div class="gcal-container" id="gcalGrid"></div>
        </div>
    </div>

    <script>
const SUPABASE_URL = 'https://etlutqwwqeahevsskjih.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0bHV0cXd3cWVhaGV2c3NramloIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MTYwNjIsImV4cCI6MjA5NzE5MjA2Mn0.kXvSQtGM7w28IffQ4JOtv_xtHenyDV0tC70bOd7N7nQ'; 
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY); 
        
        // 🌟 اصلاح ۱: استفاده از کلید درست برای دریافت کد ملی دانش‌آموز
        const userId = localStorage.getItem('national_id') || '3456734567';
        
        let allSchedules = []; let currentScheduleObj = null;

        // 🌗 سیستم دارک مود
        const themeBtn = document.getElementById('themeBtn');
        const currentTheme = localStorage.getItem('theme') || 'dark'; // پیش فرض دارک
        if (currentTheme === 'dark') { document.documentElement.setAttribute('data-theme', 'dark'); themeBtn.innerText = '☀️'; } else { themeBtn.innerText = '🌙'; }

        function toggleTheme() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            if (isDark) { document.documentElement.removeAttribute('data-theme'); localStorage.setItem('theme', 'light'); themeBtn.innerText = '🌙'; } 
            else { document.documentElement.setAttribute('data-theme', 'dark'); localStorage.setItem('theme', 'dark'); themeBtn.innerText = '☀️'; }
        }

        window.onload = async function() { await loadAllSchedules(); };

        async function loadAllSchedules() {
            // 🌟 اصلاح ۲: جستجو در دیتابیس بر اساس national_id به جای chat_id
            const { data, error } = await supabaseClient.from('ai_schedules').select('*')
                .eq('national_id', String(userId)).eq('status', 'approved').order('created_at', { ascending: false });
            
            if (error) {
                console.error("خطا در دریافت برنامه:", error);
                document.getElementById('gcalGrid').innerHTML = '<div style="padding: 40px; text-align: center; width: 100%; color: var(--danger);">خطا در ارتباط با سرور!</div>';
                return;
            }

            if (data && data.length > 0) {
                allSchedules = data;
                const selector = document.getElementById('weekSelector');
                selector.innerHTML = ''; // پاک کردن گزینه‌های قبلی
                
                allSchedules.forEach((sch, index) => {
                    let opt = document.createElement('option'); 
                    opt.value = index; 
                    opt.text = sch.week_label + (index === 0 ? " (جاری)" : "");
                    selector.appendChild(opt);
                });
                currentScheduleObj = allSchedules[0]; 
                renderGCal();
            } else {
                // 🌟 اضافه شدن پیام در صورت نبود برنامه
                document.getElementById('gcalGrid').innerHTML = `
                    <div style="padding: 60px 20px; text-align: center; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center;">
                        <span style="font-size: 50px; margin-bottom: 15px; opacity: 0.5;">🗓️</span>
                        <h3 style="color: var(--text-muted);">هنوز برنامه تایید شده‌ای نداری!</h3>
                        <p style="font-size: 13px; color: #64748b; margin-top: 10px;">درخواستت تو اتاق فکره یا هنوز درخواستی ندادی.</p>
                    </div>`;
            }
        }

        function changeWeek(index) { currentScheduleObj = allSchedules[index]; renderGCal(); }

        // تبدیل تاریخ میلادی به رشته شمسی (مثلاً ۲۴ مهر)
       // تبدیل تاریخ بدون باگ منطقه زمانی
        function getShamsiDateStr(isoDateStr) {
            if(!isoDateStr) return "";
            // جدا کردن سال، ماه و روز برای جلوگیری از باگ UTC
            let parts = isoDateStr.split('-');
            let dateObj = new Date(parts[0], parts[1] - 1, parts[2]);
            return new Intl.DateTimeFormat('fa-IR', { month: 'long', day: 'numeric' }).format(dateObj);
        }
        function renderGCal() {
            const container = document.getElementById('gcalGrid'); container.innerHTML = '';
            const daysArr = ['شنبه', 'یکشنبه', 'دوشنبه', 'سه‌شنبه', 'چهارشنبه', 'پنجشنبه', 'جمعه'];
            
            let timeColHtml = `<div class="gcal-time-col"><div class="gcal-time-header">ساعت</div>`;
            for(let i=6; i<=23; i++) { timeColHtml += `<div class="gcal-time-slot">${i.toString().padStart(2,'0')}:00</div>`; }
            container.innerHTML += timeColHtml + `</div>`;

            const planArr = currentScheduleObj.raw_plan || [];
            
            daysArr.forEach(day => {
                let dayBlocks = planArr.filter(p => p.day === day && p.subject !== "بانک جبرانی");
                
                // استخراج تاریخ واقعی این روز از اولین پارتِ همون روز
                let actualDateShamsi = "تاریخ نامعلوم";
                if(dayBlocks.length > 0 && dayBlocks[0].actual_date) {
                    actualDateShamsi = getShamsiDateStr(dayBlocks[0].actual_date);
                }

                let dayHtml = `<div class="gcal-day-col">
                                <div class="gcal-day-header">${day}<span class="gcal-day-date">${actualDateShamsi}</span></div>
                                <div class="gcal-day-grid">`;
                
                dayBlocks.forEach(part => {
                    let startMins = (parseInt(part.start_time.split(':')[0])*60) + parseInt(part.start_time.split(':')[1]);
                    let endMins = (parseInt(part.end_time.split(':')[0])*60) + parseInt(part.end_time.split(':')[1]);
                    let topPx = Math.max(0, startMins - 360); let heightPx = endMins - startMins;

                    let bgColor = "#64748b";
                    if(part.type === 'class') bgColor = "#334155"; else if(part.type === 'online_debt') bgColor = "#ef4444";
                    else if(part.subject.includes("زیست")) bgColor = "#10b981"; else if(part.subject.includes("ریاضی") || part.subject.includes("فیزیک")) bgColor = "#f59e0b";
                    else if(part.subject.includes("شیمی")) bgColor = "#3b82f6"; else if(part.type === 'general') bgColor = "#8b5cf6";

                    let statusClass = part.status === 'completed' ? 'completed' : (part.status === 'shifted' ? 'shifted' : '');
                    dayHtml += `<div class="gcal-event ${statusClass}" style="top: ${topPx}px; height: ${heightPx}px; background: ${bgColor};" title="${part.subject}">
                                    <div style="font-weight:900;font-size:11px;">${part.subject}</div>
                                    <div style="font-size:9px;font-family:monospace;">${part.start_time}-${part.end_time}</div>
                                </div>`;
                });
                container.innerHTML += dayHtml + `</div></div>`;
            });
        }
    </script>
</body>
</html>
