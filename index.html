<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود | قطب‌نمای راهینو</title>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" />
    
    <style>
        /* 🎨 پالت رنگی حرفه‌ای (سرمه‌ای عمیق و طلایی کهربایی) */
        :root { 
            --primary: #1e3a8a; 
            --primary-hover: #1e40af;
            --accent: #d97706;  
            --bg-color: #f1f5f9; 
            --surface: #ffffff;
            --text-main: #1e293b; 
            --text-muted: #64748b;
            --border: #e2e8f0;
            --shadow: 0 20px 40px rgba(30, 58, 138, 0.15);
        }

        /* 🌙 دارک مود */
        [data-theme="dark"] {
            --primary: #3b82f6; 
            --primary-hover: #60a5fa;
            --accent: #f59e0b;
            --bg-color: #0f172a; 
            --surface: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        * { box-sizing: border-box; font-family: 'Vazirmatn', sans-serif; margin: 0; padding: 0; transition: background-color 0.3s, color 0.3s; }
        
        body { 
            background: var(--bg-color); color: var(--text-main); 
            min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; 
        }

        .theme-toggle {
            position: absolute; top: 20px; left: 20px;
            background: var(--surface); border: 2px solid var(--border); color: var(--text-main);
            width: 45px; height: 45px; border-radius: 50%; cursor: pointer;
            font-size: 20px; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); z-index: 100;
        }

        .login-box { 
            background: var(--surface); border-radius: 32px; padding: 50px 40px; 
            width: 100%; max-width: 420px; box-shadow: var(--shadow); 
            border: 1px solid var(--border); text-align: center;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* 🖼️ استایل لوگوی دایره‌ای یکپارچه */
        .logo-container {
            width: 140px; height: 140px; margin: 0 auto 25px auto;
            border-radius: 50%;
            background: var(--surface);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            border: 4px solid var(--surface);
        }
        .logo-img { width: 100%; height: 100%; object-fit: cover; }
        
        h1 { font-size: 26px; font-weight: 900; color: var(--primary); margin-bottom: 8px; }
        .subtitle { color: var(--text-muted); font-size: 15px; margin-bottom: 40px; }

        .input-group { margin-bottom: 20px; text-align: right; }
        label { display: block; font-size: 13px; margin-bottom: 8px; font-weight: bold; color: var(--text-muted); }
        input[type="text"], input[type="password"] { 
            width: 100%; padding: 18px; border-radius: 16px; 
            border: 2px solid var(--border); background: var(--bg-color); color: var(--text-main);
            font-size: 16px; font-weight: bold; outline: none; transition: 0.2s; direction: ltr; text-align: left;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(30, 58, 138, 0.1); }

        .btn { width: 100%; padding: 18px; border-radius: 16px; border: none; font-weight: bold; font-size: 17px; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; box-shadow: 0 10px 20px rgba(30, 58, 138, 0.2); }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-2px); }
        .btn-primary:active { transform: translateY(0); }
        .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; }

        .forgot-link { display: inline-block; margin-top: 20px; color: var(--text-muted); font-size: 14px; font-weight: bold; cursor: pointer; text-decoration: none; }
        .forgot-link:hover { color: var(--accent); }

        .loader { display: none; font-size: 14px; color: var(--primary); font-weight: bold; margin-top: 15px; }
        .error-message { color: #ef4444; font-size: 13px; font-weight: bold; margin-top: 15px; display: none; background: #fee2e2; padding: 10px; border-radius: 10px; }
        [data-theme="dark"] .error-message { background: #7f1d1d; color: #fca5a5; }

        /* 🪟 مدال فراموشی رمز */
        .modal-overlay { 
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; 
            background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(4px);
        }
        .modal { background: var(--surface); padding: 30px; border-radius: 24px; width: 90%; max-width: 380px; text-align: center; border: 1px solid var(--border); box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .modal h3 { margin-bottom: 10px; font-size: 18px; color: var(--primary); font-weight: 800;}
        .modal p { color: var(--text-muted); font-size: 14px; margin-bottom: 25px; line-height: 1.6; }
        .btn-outline { background: transparent; border: 2px solid var(--border); color: var(--text-main); margin-top: 10px; padding: 15px;}
    </style>
</head>
<body>

    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>

    <div class="login-box">
        <!-- 🖼️ جایگاه لوگوی راهینو -->
        <div class="logo-container">
            <img src="https://s6.uupload.ir/files/gemini_generated_image_9ff8pw9ff8pw9ff8_5dhj.png" alt="لوگو راهینو" class="logo-img" onerror="this.style.display='none'; this.parentElement.innerHTML='🧭'; this.parentElement.style.fontSize='70px';">
        </div>
        
        <h1>قطب‌نمای راهینو</h1>
        <p class="subtitle">مسیر موفقیتِ دکترِ آینده</p>

        <div class="input-group">
            <label>آیدی عددی (Chat ID)</label>
            <input type="text" id="userId" placeholder="مثال: 12345678" autocomplete="off">
        </div>
        
        <div class="input-group">
            <label>رمز عبور</label>
            <input type="password" id="userPass" placeholder="••••">
        </div>

        <button class="btn btn-primary" id="loginBtn" onclick="handleLogin()">ورود به پنل</button>
        <div class="loader" id="loginLoader">در حال بررسی اطلاعات... ⏳</div>
        <div class="error-message" id="errorMsg"></div>

        <a class="forgot-link" onclick="openForgotModal()">رمز عبورت رو فراموش کردی؟</a>
    </div>

    <!-- 🪟 پنجره مدال فراموشی رمز -->
    <div class="modal-overlay" id="forgotModal">
        <div class="modal">
            <h3>بازیابی اطلاعات ورود</h3>
            <p>کد ملی خودت رو وارد کن تا آیدی و رمز عبور از طریق ربات برات ارسال بشه.</p>
            <div class="input-group" style="text-align: right;">
                <input type="text" id="forgotNid" placeholder="کد ملی ۱۰ رقمی">
            </div>
            <button class="btn btn-primary" onclick="submitForgotPassword()" id="btnForgotSend">ارسال به ربات 🚀</button>
            <button class="btn btn-outline" onclick="closeForgotModal()">انصراف</button>
        </div>
    </div>

    <script>
        // ==========================================
        // 🔗 تنظیمات اتصال (حتماً این ۳ خط رو پر کن!)
        // ==========================================
        const SUPABASE_URL = 'https://etlutqwwqeahevsskjih.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0bHV0cXd3cWVhaGV2c3NramloIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MTYwNjIsImV4cCI6MjA5NzE5MjA2Mn0.kXvSQtGM7w28IffQ4JOtv_xtHenyDV0tC70bOd7N7nQ'; 
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyUy08rtBxcRePHokg_FT0s_8e6Qj5Y1CcQXE5F_H0oX5VTvO7VhCs_KTfRp6xlKtynbA/exec'; 

        // ==========================================
        // 🌓 سیستم دارک مود
        // ==========================================
        const themeBtn = document.getElementById('themeBtn');
        const currentTheme = localStorage.getItem('theme') || 'light';
        if (currentTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            themeBtn.innerText = '☀️';
        }

        function toggleTheme() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            if (isDark) {
                document.documentElement.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
                themeBtn.innerText = '🌙';
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
                themeBtn.innerText = '☀️';
            }
        }

        // ==========================================
        // 🚪 ورود به سیستم
        // ==========================================
        async function handleLogin() {
            const idInput = document.getElementById("userId").value.trim();
            const passInput = document.getElementById("userPass").value.trim();
            const btn = document.getElementById("loginBtn");
            const loader = document.getElementById("loginLoader");
            const errorMsg = document.getElementById("errorMsg");

            errorMsg.style.display = "none";
            if (!idInput || !passInput) return showError("لطفاً آیدی و رمز عبور را وارد کنید.");

            btn.disabled = true; loader.style.display = "block";

            try {
                let cleanUrl = SUPABASE_URL.endsWith('/') ? SUPABASE_URL.slice(0, -1) : SUPABASE_URL;
                const response = await fetch(`${cleanUrl}/rest/v1/students?chat_id=eq.${idInput}&select=*`, {
                    method: 'GET', headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
                });

                if (!response.ok) throw new Error("Network error");
                const users = await response.json();

                if (users.length === 0) {
                    showError("کاربری با این آیدی یافت نشد.");
                } else {
                    const user = users[0];
                    if (user.status === 'pending') {
                        showError("فیش شما در حال بررسی توسط مدیریت است.");
                    } else if (user.status !== 'active') {
                        showError("حساب کاربری شما فعال نیست.");
                    } else if (user.password !== passInput) {
                        showError("رمز عبور اشتباه است!");
                    } else {
                        // ذخیره اطلاعات کاربر و پرش به فایل menu.html
                        localStorage.setItem('qotbnama_user_id', user.chat_id);
                        localStorage.setItem('qotbnama_full_name', user.full_name);
                        localStorage.setItem('qotbnama_role', user.role); 
                        localStorage.setItem('qotbnama_plan', user.plan_type); 
                        window.location.href = 'menu.html';
                    }
                }
            } catch (error) {
                showError("خطا در ارتباط با سرور. لطفاً اینترنت خود را چک کنید.");
            }
            btn.disabled = false; loader.style.display = "none";
        }

        function showError(text) {
            const errorMsg = document.getElementById("errorMsg");
            errorMsg.innerText = "⚠️ " + text;
            errorMsg.style.display = "block";
        }

        // ==========================================
        // 🔑 سیستم مدال فراموشی رمز
        // ==========================================
        function openForgotModal() { document.getElementById('forgotModal').style.display = 'flex'; }
        function closeForgotModal() { document.getElementById('forgotModal').style.display = 'none'; }

        async function submitForgotPassword() {
            const nid = document.getElementById('forgotNid').value.trim();
            if(!nid) { alert("لطفاً کد ملی خود را وارد کنید."); return; }

            const btn = document.getElementById('btnForgotSend');
            btn.innerText = "در حال پردازش... ⏳";
            btn.disabled = true;

            try {
                fetch(`${GOOGLE_SCRIPT_URL}?action=forgot_password&national_id=${nid}`, { mode: 'no-cors' });
                
                setTimeout(() => {
                    alert("✅ درخواست ثبت شد. در صورتی که کد ملی شما در سیستم موجود باشد، آیدی و رمز عبور هم‌اکنون به ربات شما ارسال شد.");
                    closeForgotModal();
                    btn.innerText = "ارسال به ربات 🚀";
                    btn.disabled = false;
                }, 1500);

            } catch (e) {
                console.error(e);
                alert("مشکلی پیش آمد، لطفاً اینترنت خود را چک کنید.");
                btn.innerText = "ارسال به ربات 🚀";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
