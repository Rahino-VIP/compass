<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود | قطب‌نمای راهینو</title>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" />
    
    <style>
        /* 🎨 پالت رنگی خنثی و حرفه‌ای */
        :root { 
            --primary: #0ea5e9; 
            --primary-hover: #0284c7;
            --bg-color: #f8fafc; 
            --surface: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --shadow: 0 10px 25px rgba(14, 165, 233, 0.1);
        }

        [data-theme="dark"] {
            --primary: #38bdf8;
            --primary-hover: #0ea5e9;
            --bg-color: #0f172a; 
            --surface: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }

        * { box-sizing: border-box; font-family: 'Vazirmatn', sans-serif; margin: 0; padding: 0; transition: background-color 0.3s, color 0.3s; }
        
        body { 
            background: var(--bg-color); color: var(--text-main); 
            min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; 
            background-image: radial-gradient(var(--border) 1px, transparent 1px); background-size: 20px 20px;
        }

        .theme-toggle {
            position: absolute; top: 20px; left: 20px;
            background: var(--surface); border: 2px solid var(--border); color: var(--text-main);
            width: 45px; height: 45px; border-radius: 50%; cursor: pointer;
            font-size: 20px; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); z-index: 100;
        }

        .login-box { 
            background: var(--surface); border-radius: 24px; padding: 40px 30px; 
            width: 100%; max-width: 400px; box-shadow: var(--shadow); 
            border: 1px solid var(--border); text-align: center;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .logo-emoji { font-size: 60px; margin-bottom: 10px; line-height: 1; }
        
        h1 { font-size: 24px; font-weight: 900; margin-bottom: 5px; }
        .subtitle { color: var(--text-muted); font-size: 14px; margin-bottom: 30px; font-weight: 500; }

        .input-group { margin-bottom: 20px; text-align: right; }
        label { display: block; font-size: 13px; margin-bottom: 8px; font-weight: bold; color: var(--text-muted); }
        input[type="text"], input[type="password"] { 
            width: 100%; padding: 15px; border-radius: 14px; 
            border: 2px solid var(--border); background: var(--bg-color); color: var(--text-main);
            font-size: 16px; font-weight: bold; outline: none; transition: 0.2s; direction: ltr; text-align: left;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.15); }

        .btn { width: 100%; padding: 16px; border-radius: 14px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; box-shadow: 0 4px 15px rgba(14, 165, 233, 0.3); }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-2px); }
        .btn-primary:active { transform: translateY(0); }
        .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; }

        .forgot-link { display: inline-block; margin-top: 20px; color: var(--primary); font-size: 13px; font-weight: bold; cursor: pointer; text-decoration: none; }
        .forgot-link:hover { text-decoration: underline; }

        .loader { display: none; font-size: 13px; color: var(--primary); font-weight: bold; margin-top: 15px; }
        
        .error-message { color: #ef4444; font-size: 13px; font-weight: bold; margin-top: 15px; display: none; background: #fee2e2; padding: 10px; border-radius: 8px; }
        [data-theme="dark"] .error-message { background: #7f1d1d; color: #fca5a5; }

    </style>
</head>
<body>

    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>

    <div class="login-box">
        <!-- در آینده می‌تونی به جای ایموجی، عکس لوگو رو اینجا بذاری -->
        <div class="logo-emoji">🧭</div>
        
        <h1>قطب‌نمای راهینو</h1>
        <p class="subtitle">سیستم مدیریت یادگیری هوشمند</p>

        <div class="input-group">
            <label>آیدی عددی (Chat ID)</label>
            <input type="text" id="userId" placeholder="مثال: 12345678" autocomplete="off">
        </div>
        
        <div class="input-group">
            <label>رمز عبور</label>
            <input type="password" id="userPass" placeholder="••••">
        </div>

        <button class="btn btn-primary" id="loginBtn" onclick="handleLogin()">ورود به پنل</button>
        <div class="loader" id="loginLoader">در حال بررسی اطلاعات... ⏳</div>
        <div class="error-message" id="errorMsg"></div>

        <a class="forgot-link" onclick="forgotPassword()">رمز عبورت رو فراموش کردی؟</a>
    </div>

    <script>
        // ==========================================
        // 🔗 تنظیمات اتصال به دیتابیس سوپابیس
        // ==========================================
        const SUPABASE_URL = 'https://etlutqwwqeahevsskjih.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0bHV0cXd3cWVhaGV2c3NramloIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MTYwNjIsImV4cCI6MjA5NzE5MjA2Mn0.kXvSQtGM7w28IffQ4JOtv_xtHenyDV0tC70bOd7N7nQ'; 

        // ==========================================
        // 🌓 سیستم دارک مود هوشمند
        // ==========================================
        const themeBtn = document.getElementById('themeBtn');
        const currentTheme = localStorage.getItem('theme') || 'light';
        if (currentTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            themeBtn.innerText = '☀️';
        }

        function toggleTheme() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            if (isDark) {
                document.documentElement.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
                themeBtn.innerText = '🌙';
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
                themeBtn.innerText = '☀️';
            }
        }

        // ==========================================
        // 🚪 لاگین و اتصال به سوپابیس
        // ==========================================
        async function handleLogin() {
            const idInput = document.getElementById("userId").value.trim();
            const passInput = document.getElementById("userPass").value.trim();
            const btn = document.getElementById("loginBtn");
            const loader = document.getElementById("loginLoader");
            const errorMsg = document.getElementById("errorMsg");

            // ریست کردن ارور
            errorMsg.style.display = "none";

            if (!idInput || !passInput) {
                showError("لطفاً آیدی و رمز عبور را وارد کنید.");
                return;
            }

            btn.disabled = true;
            loader.style.display = "block";

            try {
                let cleanUrl = SUPABASE_URL.endsWith('/') ? SUPABASE_URL.slice(0, -1) : SUPABASE_URL;
                // درخواست به سوپابیس برای پیدا کردن کاربر بر اساس آیدی
                const response = await fetch(`${cleanUrl}/rest/v1/students?chat_id=eq.${idInput}&select=*`, {
                    method: 'GET',
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
                });

                if (!response.ok) throw new Error("Network response was not ok");
                
                const users = await response.json();

                if (users.length === 0) {
                    showError("کاربری با این آیدی یافت نشد. آیا ثبت‌نام کرده‌اید؟");
                } else {
                    const user = users[0];
                    
                    // بررسی وضعیت کاربر
                    if (user.status === 'pending') {
                        showError("فیش شما هنوز توسط مدیریت تایید نشده است. لطفاً صبور باشید.");
                    } else if (user.status !== 'active') {
                        showError("حساب کاربری شما فعال نیست. لطفاً با پشتیبانی تماس بگیرید.");
                    } else if (user.password !== passInput) {
                        showError("رمز عبور اشتباه است!");
                    } else {
                        // ✅ ورود موفق! ذخیره اطلاعات در مرورگر
                        localStorage.setItem('qotbnama_user_id', user.chat_id);
                        localStorage.setItem('qotbnama_full_name', user.full_name);
                        localStorage.setItem('qotbnama_role', user.role); // برای قفل کردن بخش‌های VIP
                        localStorage.setItem('qotbnama_plan', user.plan_type); 

                        // هدایت به صفحه داشبورد (منوی اصلی)
                        window.location.href = 'menu.html';
                    }
                }
            } catch (error) {
                console.error("Error:", error);
                showError("خطا در برقراری ارتباط با سرور. لطفاً اینترنت خود را چک کنید.");
            }

            btn.disabled = false;
            loader.style.display = "none";
        }

        function showError(text) {
            const errorMsg = document.getElementById("errorMsg");
            errorMsg.innerText = "⚠️ " + text;
            errorMsg.style.display = "block";
        }

        function forgotPassword() {
            alert("برای بازیابی رمز عبور، لطفاً در ربات کلمه /forgot را ارسال کنید تا رمز جدید برایتان پیامک شود.");
            // بعداً می‌تونیم این رو به یک مدال تبدیل کنیم که مستقیماً به گوگل اسکریپت ریکوئست بزنه
        }
    </script>
</body>
</html>
