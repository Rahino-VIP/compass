<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود</title>
    <!-- اتصال به فایل مانیفست برای تبدیل شدن به اپلیکیشن -->
    <link rel="manifest" href="manifest.json">
    
    <!-- رنگ نوار بالای مرورگر (کروم اندروید) -->
    <meta name="theme-color" content="#0f172a">

    <!-- ========================================== -->
    <!-- 🍎 کدهای اختصاصی برای آیفون (سافاری) 🍎 -->
    <!-- ========================================== -->
    
    <!-- حذف نوار آدرس و تمام‌صفحه شدن در آیفون -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <!-- تغییر رنگ نوار بالای آیفون (ساعت و باتری) تا با برنامه هماهنگ بشه -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- اسمی که زیر آیکون تو گوشی‌های آیفون نوشته میشه -->
    <meta name="apple-mobile-web-app-title" content="قطب‌نما">
    
    <!-- آیکون مخصوص آیفون (لینکت رو اینجا هم بذار) -->
    <link rel="apple-touch-icon" href="https://etlutqwwqeahevsskjih.supabase.co/storage/v1/object/public/photo/Gemini_Generated_Image_j6dhndj6dhndj6dh%20(1).png">
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        /* 🎨 پالت رنگی حرفه‌ای (دارک و لایت) */
        /* 🎨 پالت رنگی اختصاصی راهینو (الهام گرفته از لوگو) */
        :root { 
            /* تم روشن (Light Mode) */
            --primary: #639889;       /* سبز سدری ملایم (دکمه‌های اصلی) */
            --primary-hover: #4d7a6e; /* سبز تیره‌تر برای هاور */
            --accent: #d9858a;        /* صورتی رزگلد (لینک‌ها و مکمل) */
            
            --bg-color: #f7f9f8;      /* پس‌زمینه بسیار روشن با هاله سبز/خاکستری */
            --surface: #ffffff;       /* رنگ باکس‌ها */
            --text-main: #2d3748;     /* متن اصلی */
            --text-muted: #718096;    /* متن کمرنگ */
            --border: #e2e8f0;        
            --shadow: 0 20px 40px rgba(99, 152, 137, 0.15); /* سایه همرنگ با برند */
            
            --danger: #ef4444; 
            --success: #10b981;
        }

        [data-theme="dark"] {
            /* تم تاریک (Dark Mode) */
            --primary: #77bba9;       /* سبز روشن‌تر برای دید بهتر در تاریکی */
            --primary-hover: #8fd0bf; 
            --accent: #e59ea3;        /* صورتی روشن‌تر */
            
            --bg-color: #121918;      /* سبز-خاکستری بسیار تیره (لوکس) */
            --surface: #1b2624;       /* باکس‌های تیره */
            --text-main: #f1f5f9;     
            --text-muted: #94a3b8;    
            --border: #2d3d3a;        
            --shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }
        * { box-sizing: border-box; font-family: 'Vazirmatn', sans-serif; margin: 0; padding: 0; transition: background-color 0.3s, color 0.3s; }
        
        body { background: var(--bg-color); color: var(--text-main); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; position: relative; }

        .theme-toggle { position: absolute; top: 20px; left: 20px; background: var(--surface); border: 2px solid var(--border); color: var(--text-main); width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 20px; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); z-index: 100; }

        .auth-box { background: var(--surface); border-radius: 32px; padding: 50px 40px; width: 100%; max-width: 420px; box-shadow: var(--shadow); border: 1px solid var(--border); text-align: center; animation: slideUp 0.5s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .logo-container { width: 120px; height: 120px; margin: 0 auto 25px auto; border-radius: 50%; background: var(--surface); box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; display: flex; justify-content: center; align-items: center; border: 4px solid var(--surface); }
        .logo-img { width: 100%; height: 100%; object-fit: cover; }
        
        h1 { font-size: 24px; font-weight: 900; color: var(--primary); margin-bottom: 8px; }
        .subtitle { color: var(--text-muted); font-size: 14px; margin-bottom: 30px; }

        .input-group { margin-bottom: 20px; text-align: right; }
        label { display: block; font-size: 13px; margin-bottom: 8px; font-weight: bold; color: var(--text-muted); }
        input { width: 100%; padding: 16px; border-radius: 16px; border: 2px solid var(--border); background: var(--bg-color); color: var(--text-main); font-size: 15px; font-weight: bold; outline: none; transition: 0.2s; direction: ltr; text-align: left; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(30, 58, 138, 0.1); }

        .btn { width: 100%; padding: 18px; border-radius: 16px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-hover)); color: white; box-shadow: 0 10px 20px rgba(30, 58, 138, 0.2); }
        .btn-primary:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; }
        .btn-outline { background: transparent; border: 2px solid var(--border); color: var(--text-main); padding: 14px; margin-top: 10px; }
        .btn-outline:hover { background: var(--bg-color); }

        .footer-links { display: flex; justify-content: space-between; align-items: center; margin-top: 25px; font-size: 13px; font-weight: bold; }
        .link-text { color: var(--text-muted); cursor: pointer; text-decoration: none; transition: 0.2s; }
        .link-text:hover { color: var(--accent); }

        .alert-box { font-size: 13px; font-weight: bold; margin-top: 15px; display: none; padding: 12px; border-radius: 12px; text-align: center; }
        .alert-error { color: var(--danger); background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); }
        .alert-success { color: var(--success); background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.3); }

        /* 🪟 مدال‌ها (فراموشی رمز) */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(4px); }
        .modal { background: var(--surface); padding: 30px; border-radius: 24px; width: 90%; max-width: 400px; text-align: center; border: 1px solid var(--border); box-shadow: 0 20px 40px rgba(0,0,0,0.2); animation: slideUp 0.3s ease-out; }
        .modal h3 { margin-bottom: 15px; font-size: 18px; color: var(--primary); font-weight: 800;}
        .modal p { color: var(--text-muted); font-size: 13px; margin-bottom: 25px; line-height: 1.6; }
        .security-box { background: var(--bg-color); border: 1px solid var(--border); padding: 15px; border-radius: 12px; margin-bottom: 20px; font-weight: bold; color: var(--accent); }
    </style>
</head>
<body>

    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">☀️</button>

    <div class="auth-box">
        <div class="logo-container">
            <img src="https://s6.uupload.ir/files/gemini_generated_image_9ff8pw9ff8pw9ff8_5dhj.png" alt="لوگو راهینو" class="logo-img">
        </div>
        
        <h1>قطب‌نمای راهینو</h1>
        <p class="subtitle">سیستم هوشمند مدیریت، مشاوره و برنامه‌ریزی</p>

        <div id="mainAlert" class="alert-box"></div>

        <div class="input-group">
            <label>کد ملی (نام کاربری)</label>
            <input type="text" id="loginNid" placeholder="مثال: 0012345678" autocomplete="off">
        </div>
        
        <div class="input-group">
            <label>رمز عبور</label>
            <input type="password" id="loginPass" placeholder="••••••••">
        </div>

        <button class="btn btn-primary" id="loginBtn" onclick="handleLogin()">ورود به حساب</button>

        <div class="footer-links">
            <span class="link-text" onclick="openModal('forgotModal1')">رمز عبور را فراموش کردم</span>
            <a href="register-step1.html" class="link-text" style="color: var(--primary);">ثبت‌نام دانش‌آموز جدید</a>
        </div>
    </div>

    <div class="modal-overlay" id="forgotModal1">
        <div class="modal">
            <h3>بازیابی رمز عبور</h3>
            <p>کد ملی خود را وارد کنید تا سوال امنیتی شما نمایش داده شود.</p>
            <div class="input-group">
                <input type="text" id="forgotNidInput" placeholder="کد ملی ۱۰ رقمی">
            </div>
            <button class="btn btn-primary" id="btnForgotGetQ" onclick="getSecurityQuestion()">دریافت سوال امنیتی</button>
            <button class="btn btn-outline" onclick="closeModals()">انصراف</button>
            <div id="forgotAlert1" class="alert-box" style="margin-top: 10px;"></div>
        </div>
    </div>

    <div class="modal-overlay" id="forgotModal2">
        <div class="modal">
            <h3>تایید هویت و تغییر رمز</h3>
            <div class="security-box" id="lblSecurityQuestion">سوال امنیتی در اینجا نمایش داده می‌شود</div>
            
            <div class="input-group">
                <input type="text" id="forgotAnswerInput" placeholder="پاسخ شما به سوال بالا..." style="text-align: right; direction: rtl;">
            </div>
            <div class="input-group">
                <input type="password" id="forgotNewPassInput" placeholder="رمز عبور جدید (حداقل ۴ حرف)">
            </div>
            
            <button class="btn btn-primary" id="btnForgotSubmit" onclick="resetPassword()">ثبت رمز عبور جدید</button>
            <button class="btn btn-outline" onclick="closeModals()">انصراف</button>
            <div id="forgotAlert2" class="alert-box" style="margin-top: 10px;"></div>
        </div>
    </div>

    <script>
        // ==========================================
        // 🔒 لایه‌های امنیتی (جلوگیری از کپی و Inspect)
        // ==========================================
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.onkeydown = function(e) {
            if(e.keyCode == 123) return false; 
            if(e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'C'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0))) return false; 
            if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false; 
        };
        // ==========================================
        // 🔗 تنظیمات اتصال
        // ==========================================
        const SUPABASE_URL = 'https://etlutqwwqeahevsskjih.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0bHV0cXd3cWVhaGV2c3NramloIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MTYwNjIsImV4cCI6MjA5NzE5MjA2Mn0.kXvSQtGM7w28IffQ4JOtv_xtHenyDV0tC70bOd7N7nQ'; 
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyUy08rtBxcRePHokg_FT0s_8e6Qj5Y1CcQXE5F_H0oX5VTvO7VhCs_KTfRp6xlKtynbA/exec'; 

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ==========================================
        // 🌓 سیستم دارک مود هوشمند
        // ==========================================
        const themeBtn = document.getElementById('themeBtn');
        const currentTheme = localStorage.getItem('theme') || 'dark';
        
        // تنظیم تم اولیه موقع لود شدن صفحه
        if (currentTheme === 'dark') {
            document.body.setAttribute('data-theme', 'dark');
            themeBtn.innerText = '☀️';
        } else {
            document.body.removeAttribute('data-theme');
            themeBtn.innerText = '🌙';
        }

        function toggleTheme() {
            const isDark = document.body.getAttribute('data-theme') === 'dark';
            if (isDark) {
                document.body.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
                themeBtn.innerText = '🌙';
            } else {
                document.body.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
                themeBtn.innerText = '☀️';
            }
        }
        // ==========================================
        // 🚪 موتور ورود هوشمند (Login Routing)
        // ==========================================
        function showMainAlert(msg, type = 'error') {
            const box = document.getElementById('mainAlert');
            if(!msg) { box.style.display = 'none'; return; }
            box.className = type === 'error' ? 'alert-box alert-error' : 'alert-box alert-success';
            box.innerText = msg;
            box.style.display = 'block';
        }

        async function handleLogin() {
            const nid = document.getElementById("loginNid").value.trim();
            const pass = document.getElementById("loginPass").value.trim();
            if (!nid || !pass) return showMainAlert("لطفاً کد ملی و رمز عبور را وارد کنید.");

            const btn = document.getElementById("loginBtn");
            btn.disabled = true; btn.innerText = "در حال ارتباط با سرور... ⏳";
            showMainAlert('');

            try {
                // جستجوی مستقیم و رعدآسا در دیتابیس سوپابیس
                const { data: users, error } = await supabaseClient
                    .from('students')
                    .select('*')
                    .eq('national_id', nid);

                if (error) throw new Error("خطا در ارتباط با پایگاه داده.");
                if (!users || users.length === 0) throw new Error("کد ملی وارد شده در سیستم ثبت نشده است.");

                const user = users[0];
                if (user.password !== pass) throw new Error("رمز عبور اشتباه است!");

                // 🧭 مسیریاب هوشمند بر اساس وضعیت اکانت
                if (user.status === 'draft' || user.status === 'rejected') {
                    // دانش‌آموز هنوز فیش نداده! ذخیره کدملی و هدایت به مرحله دوم ثبت‌نام
                    localStorage.setItem('temp_reg_nid', user.national_id);
                    window.location.href = 'register-step2.html';
                } 
                else if (user.status === 'pending') {
                    showMainAlert('⏳ حساب شما در صف تایید مدیریت قرار دارد. لطفاً تا بررسی فیش صبور باشید.', 'success');
                } 
                else if (user.status === 'active') {
                    // ورود موفقیت‌آمیز به داشبورد
                    localStorage.setItem('qotbnama_user_id', user.national_id); // کلید اصلی جدید
                    localStorage.setItem('qotbnama_full_name', user.full_name);
                    localStorage.setItem('qotbnama_plan', user.plan_type); 
                    window.location.href = 'menu.html';
                }

            } catch (err) {
                showMainAlert(err.message, 'error');
            }
            
            btn.disabled = false; btn.innerText = "ورود به حساب";
        }

        // ==========================================
        // 🔑 سیستم فراموشی رمز عبور (ارتباط مستقیم با سوپابیس)
        // ==========================================
        let forgotNidGlobal = "";

        function openModal(id) { 
            closeModals(); 
            document.getElementById(id).style.display = 'flex'; 
        }
        function closeModals() { 
            document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none'); 
        }
        function showForgotAlert(modalNum, msg, type = 'error') {
            const box = document.getElementById(`forgotAlert${modalNum}`);
            if(!msg) { box.style.display = 'none'; return; }
            box.className = type === 'error' ? 'alert-box alert-error' : 'alert-box alert-success';
            box.innerText = msg; box.style.display = 'block';
        }

        // مرحله ۱: دریافت سوال امنیتی (مستقیم از دیتابیس)
        async function getSecurityQuestion() {
            const nid = document.getElementById('forgotNidInput').value.trim();
            if(!nid) return showForgotAlert(1, "کد ملی الزامی است.");
            
            const btn = document.getElementById('btnForgotGetQ');
            btn.disabled = true; btn.innerText = "در حال جستجو... ⏳";
            showForgotAlert(1, '');

            try {
                // جستجوی مستقیم در جدول دانش‌آموزان
                const { data: users, error } = await supabaseClient
                    .from('students')
                    .select('security_question')
                    .eq('national_id', nid);

                if (error) throw new Error("خطا در ارتباط با دیتابیس.");
                if (!users || users.length === 0) throw new Error("این کد ملی در سیستم ثبت نشده است.");
                if (!users[0].security_question) throw new Error("سوال امنیتی برای شما ثبت نشده است. با مدیریت تماس بگیرید.");

                forgotNidGlobal = nid;
                document.getElementById('lblSecurityQuestion').innerText = users[0].security_question;
                openModal('forgotModal2'); // رفتن به مدال دوم

            } catch(err) {
                showForgotAlert(1, err.message, 'error');
            }
            btn.disabled = false; btn.innerText = "دریافت سوال امنیتی";
        }

        // مرحله ۲: بررسی پاسخ و تغییر رمز (مستقیم در دیتابیس)
        async function resetPassword() {
            const answer = document.getElementById('forgotAnswerInput').value.trim();
            const newPass = document.getElementById('forgotNewPassInput').value.trim();
            
            if(!answer || !newPass) return showForgotAlert(2, "پاسخ و رمز جدید را وارد کنید.");
            if(newPass.length < 4) return showForgotAlert(2, "رمز عبور جدید باید حداقل ۴ کاراکتر باشد.");
            
            const btn = document.getElementById('btnForgotSubmit');
            btn.disabled = true; btn.innerText = "در حال بررسی... ⏳";
            showForgotAlert(2, '');

            try {
                // ۱. گرفتن جواب امنیتی ثبت شده از دیتابیس
                const { data: users, error: fetchErr } = await supabaseClient
                    .from('students')
                    .select('security_answer')
                    .eq('national_id', forgotNidGlobal);

                if (fetchErr || !users || users.length === 0) throw new Error("حساب کاربری یافت نشد.");
                
                // ۲. مقایسه جواب کاربر با جواب دیتابیس
                if (users[0].security_answer !== answer) throw new Error("پاسخ به سوال امنیتی اشتباه است!");

                // ۳. آپدیت رمز عبور در دیتابیس
                const { error: updateErr } = await supabaseClient
                    .from('students')
                    .update({ password: newPass })
                    .eq('national_id', forgotNidGlobal);

                if (updateErr) throw new Error("خطا در ذخیره رمز عبور جدید.");

                showForgotAlert(2, "✅ رمز عبور با موفقیت تغییر کرد. در حال انتقال...", 'success');
                setTimeout(() => { 
                    closeModals(); 
                    document.getElementById('loginNid').value = forgotNidGlobal;
                    document.getElementById('loginPass').value = '';
                }, 2000);

            } catch(err) {
                showForgotAlert(2, err.message, 'error');
            }
            btn.disabled = false; btn.innerText = "ثبت رمز عبور جدید";
        }
    </script>
</body>
</html>
