<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>درخواست استراتژی | قطب‌نما</title>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root { --vip-bg: #f8fafc; --vip-surface: #ffffff; --vip-border: #e2e8f0; --gold: #d97706; --success: #10b981; --text-main: #0f172a; --text-muted: #64748b; }
        [data-theme="dark"] { --vip-bg: #0f172a; --vip-surface: #1e293b; --vip-border: #334155; --gold: #f59e0b; --success: #10b981; --text-main: #f8fafc; --text-muted: #94a3b8; }
        
        * { box-sizing: border-box; font-family: 'Vazirmatn', sans-serif; margin: 0; padding: 0; transition: background-color 0.3s, color 0.3s; }
        body { background: var(--vip-bg); color: var(--text-main); line-height: 1.6; padding-bottom: 90px; }
        .app-container { max-width: 700px; margin: 0 auto; padding: 20px; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .theme-toggle { background: var(--vip-surface); border: 1px solid var(--vip-border); color: var(--text-main); width: 45px; height: 45px; border-radius: 14px; cursor: pointer; font-size: 20px; display: flex; justify-content: center; align-items: center; }

        .nav-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .action-btn { background: var(--vip-surface); border: 1px solid var(--vip-border); width: 45px; height: 45px; border-radius: 14px; display: flex; justify-content: center; align-items: center; text-decoration: none; color: var(--text-main); font-size: 20px; }
        .page-title { font-size: 18px; font-weight: 900; color: var(--gold); }

        .tabs-container { display: flex; background: var(--vip-surface); border-radius: 16px; padding: 5px; margin-bottom: 25px; border: 1px solid var(--vip-border); }
        .tab-btn { flex: 1; text-align: center; padding: 12px 2px; font-size: 13px; font-weight: bold; color: var(--text-muted); text-decoration: none; border-radius: 12px; transition: 0.3s; }
        .tab-btn.active { background: var(--gold); color: #000; box-shadow: 0 5px 15px rgba(245, 158, 11, 0.3); }

        .friday-box { background: var(--vip-surface); border: 1px solid var(--vip-border); border-radius: 24px; padding: 30px 20px; text-align: center; }
        .friday-icon { font-size: 60px; margin-bottom: 15px; display: block; }
        .friday-title { font-size: 20px; font-weight: 900; color: var(--gold); margin-bottom: 10px; }
        
        .toggle-row { display: flex; justify-content: space-between; align-items: center; background: var(--vip-bg); padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid var(--vip-border); text-align: right; }
        .toggle-switch { position: relative; width: 44px; height: 24px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--vip-border); transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--success); }
        input:checked + .slider:before { transform: translateX(20px); }

        textarea.modern-input { width: 100%; padding: 15px; border-radius: 16px; border: 1px solid var(--vip-border); background: var(--vip-bg); color: var(--text-main); font-size: 13px; resize: none; outline: none; margin-top: 10px; margin-bottom: 20px; }
        .btn-gold { background: linear-gradient(135deg, var(--gold), #d97706); color: #000; width: 100%; padding: 18px; border-radius: 16px; border: none; font-size: 16px; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="nav-header">
            <a href="menu.html" class="action-btn">🔙</a>
            <div class="page-title">قطب‌نمای راهینو</div>
            <div style="display: flex; gap: 10px;">
                <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>
                <a href="vip-setup.html" class="action-btn">⚙️</a>
            </div>
        </div>

        <div class="tabs-container">
            <a href="schedule.html" class="tab-btn">🎯 عملیات امروز</a>
            <a href="week.html" class="tab-btn">🗓️ تقویم هفته</a>
            <a href="request.html" class="tab-btn active">🎁 اتاق فکر</a>
        </div>

        <div class="friday-box" id="fridayActionBox">
            <span class="friday-icon">📨</span>
            <h2 class="friday-title">فرم استراتژی اتاق فکر</h2>
            <p style="color:var(--text-muted);font-size:13px;margin-bottom:20px;">اولویت‌های خود را مشخص کنید تا مشاوران بهترین برنامه را تدوین کنند.</p>
            
            <div id="fridayForm">
                <div id="dynamicSwitchesArea"></div>
                
                <textarea class="modern-input" id="nextWeekNote" rows="3" placeholder="یادداشت برای مشاور (مثلاً: سه‌شنبه تا دیروقت مدرسه‌ام یا این هفته حسابی خسته‌ام...)"></textarea>
                <button class="btn-gold" id="btnRequestPlan" onclick="requestNewSchedule()">ارسال اطلاعات به اتاق فکر 🚀</button>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 🌓 سیستم تغییر تم (دارک و لایت مود)
        // ==========================================
        function toggleTheme() {
            const root = document.documentElement;
            const currentTheme = root.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            root.setAttribute('data-theme', newTheme);
            
            // ذخیره تم تو مرورگر که با رفرش نپره
            localStorage.setItem('app_theme', newTheme);
        }

        // بررسی تم ذخیره شده موقع لود صفحه
        document.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('app_theme');
            if (savedTheme) {
                document.documentElement.setAttribute('data-theme', savedTheme);
            }
        });

        // ==========================================
        // 🚀 سیستم ارسال درخواست برنامه‌ریزی
        // ==========================================
        // ==========================================
        // تنظیمات پایه و اتصال به سوپابیس
        // ==========================================
        const SUPABASE_URL = 'https://etlutqwwqeahevsskjih.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0bHV0cXd3cWVhaGV2c3NramloIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MTYwNjIsImV4cCI6MjA5NzE5MjA2Mn0.kXvSQtGM7w28IffQ4JOtv_xtHenyDV0tC70bOd7N7nQ'; 
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const GAS_WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbyUy08rtBxcRePHokg_FT0s_8e6Qj5Y1CcQXE5F_H0oX5VTvO7VhCs_KTfRp6xlKtynbA/exec';

        // 🌟 سیستم هوشمند استخراج آیدی
        const userId = localStorage.getItem('national_id') || 
                       localStorage.getItem('qotbnama_user_id') || 
                       localStorage.getItem('student_id') || 
                       localStorage.getItem('chat_id');

        window.onload = async function() {
            if (!userId || userId === 'null' || userId === 'undefined') {
                alert("❌ خطای احراز هویت: لطفاً یک بار از حساب خارج شده و مجدداً وارد شوید.");
                window.location.replace('index.html');
                return;
            }

            let studentGrade = 'all';
            let studentExams = [];

            try {
                // استخراج پایه
                const { data: stData, error: stErr } = await supabaseClient.from('students').select('grade').eq('national_id', String(userId)).maybeSingle();
                if (stData && stData.grade) studentGrade = stData.grade;

                // استخراج آزمون‌ها
                const { data: vipData, error: vipErr } = await supabaseClient.from('vip_settings').select('exam_type').eq('national_id', String(userId)).maybeSingle();
                if (vipData && vipData.exam_type) {
                    studentExams = typeof vipData.exam_type === 'string' ? JSON.parse(vipData.exam_type) : vipData.exam_type;
                }
            } catch (e) {
                console.warn("خطا در دریافت اطلاعات پایه دانش‌آموز", e);
            }

            // اجرا کردن تابع لود سوئیچ‌ها
            await loadDynamicSwitches(studentGrade, studentExams);
        };

        // ==========================================
        // 🎛️ لود کردن و فیلتر کردن سوئیچ‌ها از دیتابیس
        // ==========================================
        // ==========================================
        // 🎛️ لود کردن و فیلتر کردن سوئیچ‌ها از دیتابیس
        // ==========================================
        async function loadDynamicSwitches(studentGrade, studentExams) {
            const container = document.getElementById('dynamicSwitchesArea');
            container.innerHTML = '<div style="text-align:center; font-size:12px; color:var(--text-muted);">در حال بررسی گزینه‌های اختصاصی شما... ⏳</div>';

            try {
                const { data, error } = await supabaseClient.from('dynamic_switches').select('*').eq('is_active', true);
                if (error) throw error;
                container.innerHTML = ''; 
                
                if (data && data.length > 0) {
                    let validSwitches = data.filter(sw => {
                        let gradeMatch = (sw.target_grade === 'all' || studentGrade.includes(sw.target_grade));
                        let examMatch = (sw.target_exam === 'all' || studentExams.some(ex => ex.includes(sw.target_exam)));
                        return gradeMatch && examMatch;
                    });

                    if (validSwitches.length > 0) {
                        validSwitches.forEach(sw => {
                            container.innerHTML += `
                                <label class="toggle-row">
                                    <span style="font-size:13px;font-weight:bold;">${sw.title}</span>
                                    <label class="toggle-switch">
                                        <input type="checkbox" class="dynamic-toggle-input" data-key="${sw.action_key}" data-title="${sw.title}">
                                        <span class="slider"></span>
                                    </label>
                                </label>
                            `;
                        });
                    } else {
                        container.innerHTML = '<div style="font-size:11px; color:var(--text-muted); text-align:center; margin-bottom:15px;">تنظیمات خاصی برای پایه و آزمون شما در این هفته وجود ندارد.</div>';
                    }
                } else {
                    container.innerHTML = '<div style="font-size:11px; color:var(--text-muted); text-align:center; margin-bottom:15px;">تنظیمات خاصی در سیستم فعال نیست.</div>';
                }
            } catch (err) {
                console.error("خطا در لود سوئیچ‌ها:", err);
                container.innerHTML = '';
            }
        }

        // ==========================================
        // 🚀 ارسال درخواست برنامه به هسته مرکزی
        // ==========================================
        // ==========================================
        // 🚀 ارسال درخواست برنامه به هسته مرکزی (نسخه هوشمند با محاسبه میانگین)
        // ==========================================
        async function requestNewSchedule() {
            const noteInput = document.getElementById('nextWeekNote'); 
            const note = noteInput ? noteInput.value : '';

            // 🎛️ جمع‌آوری هوشمند وضعیت سوئیچ‌ها
            let studentOptions = {};
            let activeSwitchTitles = []; 
            const toggles = document.querySelectorAll('.dynamic-toggle-input');
            toggles.forEach(toggle => {
                let key = toggle.getAttribute('data-key');
                let title = toggle.getAttribute('data-title');
                studentOptions[key] = toggle.checked; 
                if (toggle.checked) activeSwitchTitles.push(title); 
            });

            const btn = document.getElementById('btnRequestPlan');
            if(btn) {
                btn.innerHTML = 'در حال محاسبه توان مطالعاتی و ارسال... ⏳'; 
                btn.disabled = true;
            }

            // 📊 محاسبه میانگین مطالعه و تست از گزارش‌های روزانه دانش‌آموز
            let avgStudyHours = 0;
            let avgTestCount = 0;
            try {
                // دریافت گزارش‌های قبلی (دقیقاً مثل منطق داشبورد)
                const { data: reports } = await supabaseClient
                    .from('daily_reports')
                    .select('courses')
                    // در داشبورد با chat_id ذخیره شده، پس اینجا هم همون کلید رو چک می‌کنیم
                    .eq('chat_id', String(localStorage.getItem('qotbnama_user_id') || userId));

                if (reports && reports.length > 0) {
                    let totalTime = 0;
                    let totalTests = 0;
                    reports.forEach(r => {
                        if(r.courses) {
                            r.courses.forEach(c => {
                                totalTime += (c.edu || 0) + (c.study || 0);
                                totalTests += (c.tests || 0);
                            });
                        }
                    });
                    // گرد کردن اعداد
                    avgStudyHours = Math.round((totalTime / reports.length) * 10) / 10;
                    avgTestCount = Math.round(totalTests / reports.length);
                }
            } catch(e) {
                console.warn("خطا در محاسبه میانگین گزارش‌ها:", e);
            }

            try {
                // 🌟 ارسال تمامی اطلاعات + میانگین‌ها به سرور گوگل
                await fetch(GAS_WEBAPP_URL, {
                    method: 'POST',
                    mode: 'no-cors', 
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ 
                        action: 'generate_schedule', 
                        student_id: userId, 
                        student_note: note, 
                        target_exam_date: '02_05_1405', 
                        student_options: studentOptions, 
                        active_switch_titles: activeSwitchTitles,
                        avg_study_hours: avgStudyHours, // 🎯 میانگین ساعت مطالعه ارسال شد
                        avg_test_count: avgTestCount    // 🎯 میانگین تعداد تست ارسال شد
                    })
                });

                const formContainer = document.getElementById('fridayForm') || document.body;
                formContainer.innerHTML = `
                    <div style="background: rgba(16, 185, 129, 0.1); border: 1px solid var(--success); padding: 20px; border-radius: 16px; text-align: center; margin-top: 20px; animation: fadeIn 0.5s;">
                        <div style="font-size: 40px; margin-bottom: 10px;">✅</div>
                        <h3 style="color: var(--success); margin-bottom: 10px;">درخواست با موفقیت ثبت شد</h3>
                        <p style="font-size: 14px; color: var(--text-muted); line-height: 1.6;">
                            اطلاعات شما به همراه تنظیمات اختصاصی به هسته مرکزی ارسال شد. الگوریتم در حال چیدمان برنامه‌ی شماست. 
                        </p>
                    </div>
                `;

            } catch (error) {
                console.error("Fetch Error:", error);
                alert('❌ اینترنت شما ضعیف است یا ارتباط برقرار نشد.');
                if(btn) {
                    btn.innerHTML = 'ارسال اطلاعات به اتاق فکر 🚀'; 
                    btn.disabled = false;
                }
            }
        }
    </script>
</body>
</html>
