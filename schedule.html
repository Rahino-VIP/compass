<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قطب‌نمای راهینو VIP</title>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root { 
            --vip-bg: #0f172a; --vip-surface: #1e293b; --vip-border: #334155;
            --gold: #f59e0b; --success: #10b981; --danger: #ef4444; --warning: #f59e0b;
            --text-main: #f8fafc; --text-muted: #94a3b8;
        }

        * { box-sizing: border-box; font-family: 'Vazirmatn', sans-serif; margin: 0; padding: 0; user-select: none; }
        body { background: var(--vip-bg); color: var(--text-main); line-height: 1.6; padding-bottom: 80px; }
        .app-container { max-width: 800px; margin: 0 auto; padding: 20px; }
        
        .nav-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .action-btn { background: var(--vip-surface); border: 1px solid var(--vip-border); width: 45px; height: 45px; border-radius: 14px; display: flex; justify-content: center; align-items: center; text-decoration: none; color: var(--text-main); font-size: 20px; cursor: pointer; }
        .page-title { font-size: 18px; font-weight: 900; color: var(--gold); display: flex; flex-direction: column; align-items: center; }
        
        /* منوی کشویی انتخاب هفته */
        select.week-selector { background: var(--vip-surface); border: 1px solid var(--gold); color: var(--gold); padding: 5px 10px; border-radius: 8px; outline: none; font-size: 11px; margin-top: 5px; font-family: 'Vazirmatn'; }

        .tabs-container { display: flex; background: var(--vip-surface); border-radius: 16px; padding: 5px; margin-bottom: 25px; border: 1px solid var(--vip-border); }
        .tab-btn { flex: 1; text-align: center; padding: 12px; font-size: 13px; font-weight: bold; color: var(--text-muted); cursor: pointer; border-radius: 12px; transition: 0.3s; }
        .tab-btn.active { background: var(--gold); color: #000; }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* کارت مأموریت امروز */
        .quest-card { background: var(--vip-surface); border: 1px solid var(--vip-border); border-radius: 20px; padding: 15px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; border-right: 4px solid var(--vip-border); }
        .quest-card.completed { background: rgba(16, 185, 129, 0.05); border-color: var(--success); border-right-color: var(--success); opacity: 0.6; }
        .quest-time { font-size: 11px; color: var(--text-muted); background: var(--vip-bg); padding: 4px 8px; border-radius: 6px; display: inline-block; margin-bottom: 8px; }
        .quest-title { font-size: 14px; font-weight: 900; color: var(--text-main); margin-bottom: 5px; }
        .quest-desc { font-size: 11px; color: var(--text-muted); }
        .action-circle { width: 34px; height: 34px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; border: 1px solid var(--vip-border); background: var(--vip-bg); transition: 0.2s; }
        
        /* 🗓️ تقویم گوگلی (Google Calendar Style) */
        .gcal-wrapper { overflow-x: auto; background: var(--vip-surface); border-radius: 16px; border: 1px solid var(--vip-border); margin-top: 10px; }
        .gcal-container { display: grid; grid-template-columns: 50px repeat(7, minmax(100px, 1fr)); grid-template-rows: 40px repeat(18, 60px); /* 6:00 to 24:00 */ position: relative; min-width: 800px; }
        
        .gcal-header { background: rgba(0,0,0,0.3); border-bottom: 1px solid var(--vip-border); border-left: 1px solid var(--vip-border); text-align: center; padding: 10px 0; font-size: 12px; font-weight: bold; color: var(--text-main); position: sticky; top: 0; z-index: 10; }
        .gcal-time-col { border-bottom: 1px solid var(--vip-border); text-align: center; font-size: 10px; color: var(--text-muted); transform: translateY(-8px); }
        
        .gcal-cell { border-bottom: 1px dashed var(--vip-border); border-left: 1px solid var(--vip-border); position: relative; }
        
        .gcal-event { position: absolute; left: 2px; right: 2px; border-radius: 6px; padding: 4px; font-size: 10px; color: white; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.2); border-right: 3px solid rgba(255,255,255,0.5); z-index: 5; }
        .gcal-event.completed { opacity: 0.5; background: var(--success) !important; }
        .gcal-event.shifted { opacity: 0.3; background: var(--danger) !important; text-decoration: line-through; }
        .gcal-event.class-type { background: #475569; border-right-color: #94a3b8; } /* رنگ مدرسه */

        .g-event-title { font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .g-event-time { font-size: 8px; opacity: 0.8; font-family: monospace; }
        
    </style>
</head>
<body>

    <div class="app-container" id="appContent">
        <div class="nav-header">
            <a href="menu.html" class="action-btn">🔙</a>
            <div class="page-title">
                قطب‌نمای راهینو
                <select id="weekSelector" class="week-selector" onchange="changeWeek(this.value)"></select>
            </div>
            <a href="vip-setup.html" class="action-btn">⚙️</a>
        </div>

        <div class="tabs-container">
            <div class="tab-btn active" onclick="switchTab('tabToday', this)">🎯 امروز</div>
            <div class="tab-btn" onclick="switchTab('tabWeek', this)">🗓️ تقویم هفته</div>
            <div class="tab-btn" onclick="switchTab('tabFriday', this)">🎁 اتاق فکر</div>
        </div>

        <div class="tab-content active" id="tabToday">
            <div id="questsContainer"></div>
        </div>

        <div class="tab-content" id="tabWeek">
            <div class="gcal-wrapper">
                <div class="gcal-container" id="gcalGrid">
                    </div>
            </div>
        </div>
        
        <div class="tab-content" id="tabFriday">
            <div style="text-align:center; padding:30px; background:var(--vip-surface); border-radius:16px;">
                <h2>دستیار تدوین برنامه</h2>
                <p>گزینه‌های درخواستی خود را اینجا وارد کنید.</p>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'لینک_شما'; 
        const SUPABASE_KEY = 'کلید_شما'; 
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY); 

        const userId = localStorage.getItem('qotbnama_user_id') || '999999';
        const todayNameFa = new Intl.DateTimeFormat('fa-IR', { weekday: 'long' }).format(new Date());

        let allSchedules = [];
        let currentScheduleObj = null;

        window.onload = async function() {
            await loadAllSchedules();
        };

        // 📥 گرفتن تمام برنامه‌های تاریخچه دانش‌آموز
        async function loadAllSchedules() {
            const { data, error } = await supabaseClient
                .from('ai_schedules').select('*').eq('chat_id', String(userId))
                .order('created_at', { ascending: false });
            
            if(data && data.length > 0) {
                allSchedules = data;
                
                // پر کردن منوی کشویی
                const selector = document.getElementById('weekSelector');
                selector.innerHTML = '';
                allSchedules.forEach((sch, index) => {
                    let opt = document.createElement('option');
                    opt.value = index;
                    opt.text = sch.week_label + (index === 0 ? " (هفته جاری)" : "");
                    selector.appendChild(opt);
                });

                currentScheduleObj = allSchedules[0]; // دیفالت رو آخرین هفته
                renderTodayTab();
                renderGCal();
            }
        }

        // تغییر هفته از منوی کشویی
        function changeWeek(index) {
            currentScheduleObj = allSchedules[index];
            renderTodayTab();
            renderGCal();
        }

        // ==========================================
        // 🎯 رندر تب امروز
        // ==========================================
        function renderTodayTab() {
            if(!currentScheduleObj) return;
            const planArr = currentScheduleObj.raw_plan || [];
            
            // فیلتر: فقط درس‌های امروز که کلاس یا بانک خالی نیستن
            const todaysBlocks = planArr.filter(p => 
                p.day === todayNameFa && 
                p.type !== 'class' && 
                p.subject !== 'بانک جبرانی'
            );
            
            const container = document.getElementById('questsContainer');
            container.innerHTML = '';

            todaysBlocks.forEach((part) => {
                if(part.status === 'shifted') return; 

                const isCompleted = part.status === 'completed';
                const cardClass = isCompleted ? 'completed' : '';
                
                const html = `
                    <div class="quest-card ${cardClass}" id="card_${part.block_id}">
                        <div class="quest-info">
                            <div class="quest-time">${part.start_time} - ${part.end_time}</div>
                            <div class="quest-title">${part.subject}</div>
                            <div class="quest-desc">${part.topic || ''}</div>
                        </div>
                        <div style="display:flex; gap:8px;">
                            <div class="action-circle" onclick="shiftQuest('${part.block_id}')">🔄</div>
                            <div class="action-circle" onclick="toggleQuest('${part.block_id}')">✅</div>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', html);
            });
        }

        // ==========================================
        // 🔄 عملیات دکمه‌ها
        // ==========================================
        async function savePlanToDB() {
            try {
                const { error } = await supabaseClient.from('ai_schedules')
                    .update({ raw_plan: currentScheduleObj.raw_plan }).eq('id', currentScheduleObj.id);
                if (error) throw error;
                console.log("ذخیره شد!");
            } catch (err) {
                alert("خطا در ذخیره دیتابیس!");
            }
        }

        function toggleQuest(blockId) {
            let planArr = currentScheduleObj.raw_plan;
            let block = planArr.find(p => p.block_id === blockId);
            if(!block) return;
            
            block.status = block.status === 'completed' ? 'pending' : 'completed';
            document.getElementById('card_' + blockId).classList.toggle('completed');
            savePlanToDB();
            renderGCal(); // آپدیت تقویم
        }

        function shiftQuest(blockId) {
            if(!confirm("ارسال به جبرانی؟")) return;
            let planArr = currentScheduleObj.raw_plan;
            let origIdx = planArr.findIndex(p => p.block_id === blockId);
            let origBlock = planArr[origIdx];

            let makeupIdx = planArr.findIndex((p, idx) => idx > origIdx && p.subject === "بانک جبرانی" && p.status === 'pending');
            if(makeupIdx === -1) { alert("تایم جبرانی خالی نداریم!"); return; }

            planArr[makeupIdx].subject = origBlock.subject + " (جبرانی)";
            planArr[makeupIdx].type = origBlock.type;
            origBlock.status = 'shifted';
            
            document.getElementById('card_' + blockId).style.display = 'none';
            savePlanToDB();
            renderGCal();
        }

        // ==========================================
        // 🗓️ ساخت تقویم گوگلی (Grid)
        // ==========================================
        function renderGCal() {
            const container = document.getElementById('gcalGrid');
            container.innerHTML = '';
            
            // ۱. ساخت هدر روزها
            const days = ['شنبه', 'یکشنبه', 'دوشنبه', 'سه‌شنبه', 'چهارشنبه', 'پنجشنبه', 'جمعه'];
            container.innerHTML += `<div class="gcal-header" style="grid-column: 1; grid-row: 1;">ساعت</div>`;
            days.forEach((day, index) => {
                container.innerHTML += `<div class="gcal-header" style="grid-column: ${index+2}; grid-row: 1;">${day}</div>`;
            });

            // ۲. ساخت ستون ساعت‌ها (از ۶ تا ۲۳)
            for(let i = 0; i <= 17; i++) {
                let hour = i + 6;
                container.innerHTML += `<div class="gcal-time-col" style="grid-column: 1; grid-row: ${i+2};">${hour}:00</div>`;
                // خطوط شبکه‌ی تقویم
                for(let j=0; j<7; j++) {
                    container.innerHTML += `<div class="gcal-cell" style="grid-column: ${j+2}; grid-row: ${i+2};"></div>`;
                }
            }

            // ۳. کاشتن رویدادها روی تقویم
            const planArr = currentScheduleObj.raw_plan || [];
            planArr.forEach(part => {
                if(part.subject === "بانک جبرانی" && part.status === "pending") return; // مخفی کردن بانک‌های خالی

                let colIndex = days.indexOf(part.day) + 2;
                if(colIndex < 2) return;

                // محاسبه موقعیت بر اساس زمان
                let startMins = timeStrToMins(part.start_time);
                let endMins = timeStrToMins(part.end_time);
                
                // شروع از ساعت 6 صبح (360 دقیقه)
                let startOffset = startMins - 360; 
                if(startOffset < 0) startOffset = 0;
                
                // هر 60 دقیقه = 60 پیکسل (grid-row height)
                let topPx = startOffset;
                let heightPx = endMins - startMins;

                // رنگ‌بندی
                let bgColor = "#64748b"; // default
                if(part.type === 'class') bgColor = "#475569";
                else if(part.subject.includes("زیست")) bgColor = "#10b981";
                else if(part.subject.includes("ریاضی") || part.subject.includes("فیزیک")) bgColor = "#f59e0b";

                let statusClass = part.status === 'completed' ? 'completed' : (part.status === 'shifted' ? 'shifted' : '');
                
                // تزریق بلوک رویداد (ما از grid-row: 2 / span 18 استفاده می‌کنیم تا بتونیم absolute position بدیم)
                let eventHtml = `
                    <div class="gcal-event ${statusClass}" style="grid-column: ${colIndex}; grid-row: 2 / span 18; top: ${topPx}px; height: ${heightPx}px; background: ${bgColor};">
                        <div class="g-event-title">${part.subject}</div>
                        <div class="g-event-time">${part.start_time}-${part.end_time}</div>
                    </div>
                `;
                container.innerHTML += eventHtml;
            });
        }

        function timeStrToMins(timeStr) {
            if(!timeStr) return 0;
            let p = timeStr.split(':'); return (parseInt(p[0]) * 60) + parseInt(p[1]);
        }

        function switchTab(tabId, btnElement) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btnElement.classList.add('active');
        }
    </script>
</body>
</html>
