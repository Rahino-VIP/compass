<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صندوق پیام‌ها | راهینو</title>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" />
    
    <style>
        /* ==========================================
           🎨 پالت رنگی و استایل‌های پایه
           ========================================== */
        :root { 
            --primary: #1e3a8a; --primary-light: #3b82f6; 
            --accent: #d97706; --bg-color: #f8fafc; --surface: #ffffff;
            --text-main: #0f172a; --text-muted: #64748b;
            --border: #e2e8f0; --success: #10b981; --danger: #ef4444; --warning: #f59e0b;
            --shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        [data-theme="dark"] {
            --primary: #3b82f6; --accent: #f59e0b; --bg-color: #0f172a; --surface: #1e293b;
            --text-main: #f8fafc; --text-muted: #94a3b8;
            --border: #334155; --shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        * { box-sizing: border-box; font-family: 'Vazirmatn', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg-color); color: var(--text-main); line-height: 1.6; padding-bottom: 50px; transition: 0.3s; }
        
        .app-container { max-width: 600px; margin: 0 auto; padding: 20px; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 🎩 هدر */
        .nav-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .back-btn { background: var(--surface); border: 1px solid var(--border); width: 40px; height: 40px; border-radius: 12px; display: flex; justify-content: center; align-items: center; text-decoration: none; color: var(--text-main); font-size: 20px; box-shadow: var(--shadow); cursor: pointer; transition: 0.2s; }
        .page-title { font-size: 18px; font-weight: 900; color: var(--primary); }

        /* 📨 استایل پیام‌ها */
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
        .empty-state span { font-size: 60px; display: block; margin-bottom: 15px; opacity: 0.5; }

        .msg-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; margin-bottom: 15px; padding: 15px; box-shadow: var(--shadow); transition: 0.3s; cursor: pointer; position: relative; overflow: hidden; }
        .msg-card:hover { border-color: var(--primary); }
        
        /* حالت پیام نخوانده */
        .msg-card.unread { border-right: 4px solid var(--primary); background: rgba(59, 130, 246, 0.03); }
        .msg-card.unread .msg-title { color: var(--primary); font-weight: 900; }
        
        .msg-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
        .msg-title { font-size: 14px; font-weight: bold; color: var(--text-main); display: flex; align-items: center; gap: 8px; }
        .msg-date { font-size: 11px; color: var(--text-muted); white-space: nowrap; }
        
        .msg-badge { background: var(--danger); color: white; padding: 2px 6px; border-radius: 6px; font-size: 9px; font-weight: bold; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        
        .msg-excerpt { font-size: 12px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-left: 20px; }
        
        /* بدنه پیام (مخفی در حالت عادی) */
        .msg-body { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px dashed var(--border); font-size: 13px; line-height: 1.8; color: var(--text-main); white-space: pre-wrap; }
        
        /* کلاس برای باز شدن آکاردئون */
        .msg-card.open .msg-body { display: block; animation: fadeIn 0.3s ease-out; }
        .msg-card.open .msg-excerpt { display: none; }

        .loader-overlay { position: fixed; inset: 0; background: var(--bg-color); display: flex; justify-content: center; align-items: center; z-index: 1000; flex-direction: column; }
        .spinner { font-size: 40px; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body data-theme="dark">

    <div class="loader-overlay" id="mainLoader">
        <div class="spinner">📨</div>
        <h3 style="color: var(--primary); font-size: 15px;">در حال دریافت پیام‌های شما...</h3>
    </div>

    <div class="app-container" id="appContent" style="display: none;">
        
        <div class="nav-header">
            <a href="menu.html" class="back-btn">🔙</a>
            <div class="page-title">صندوق پیام‌ها</div>
            <button class="back-btn" onclick="toggleTheme()" id="themeBtn">☀️</button>
        </div>

        <div id="messagesContainer">
            </div>

    </div>

    <script>
        // ==========================================
        // 🔗 تنظیمات سوپابیس
        // ==========================================
        const SUPABASE_URL = 'https://etlutqwwqeahevsskjih.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0bHV0cXd3cWVhaGV2c3NramloIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MTYwNjIsImV4cCI6MjA5NzE5MjA2Mn0.kXvSQtGM7w28IffQ4JOtv_xtHenyDV0tC70bOd7N7nQ'; 
        
        const userId = localStorage.getItem('qotbnama_user_id');
        if (!userId) window.location.href = 'index.html';

        let allMessages = [];

        window.onload = async function() {
            await fetchMessages();
        };

        // ==========================================
        // 📥 دریافت پیام‌ها از دیتابیس
        // ==========================================
        async function fetchMessages() {
            try {
                let cleanUrl = SUPABASE_URL.endsWith('/') ? SUPABASE_URL.slice(0, -1) : SUPABASE_URL;
                
                // دریافت پیام‌های این دانش‌آموز (مرتب شده از جدیدترین به قدیمی‌ترین)
                const response = await fetch(`${cleanUrl}/rest/v1/messages?student_nid=eq.${userId}&order=created_at.desc`, {
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
                });
                
                if (response.ok) {
                    allMessages = await response.json();
                    renderMessages();
                } else {
                    throw new Error("خطا در دریافت پیام‌ها");
                }
            } catch (error) {
                alert("امکان ارتباط با سرور وجود ندارد.");
            } finally {
                document.getElementById('mainLoader').style.display = 'none';
                document.getElementById('appContent').style.display = 'block';
            }
        }

        // ==========================================
        // 🎨 رندر کردن لیست پیام‌ها
        // ==========================================
        function renderMessages() {
            const container = document.getElementById('messagesContainer');
            
            if (allMessages.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <span>📭</span>
                        <p>صندوق پیام‌های شما در حال حاضر خالی است.</p>
                    </div>
                `;
                return;
            }

            let html = '';
            
            allMessages.forEach(msg => {
                // تبدیل تاریخ میلادی به شمسیِ خوانا
                let dateObj = new Date(msg.created_at);
                let shamsiDate = dateObj.toLocaleDateString('fa-IR', { month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                
                let unreadClass = msg.is_read ? '' : 'unread';
                let badgeHtml = msg.is_read ? '' : '<span class="msg-badge" id="badge_'+msg.id+'">جدید</span>';
                
                // یک خلاصه یک خطی از متن پیام می‌سازیم
                let excerpt = msg.body.replace(/\n/g, ' ').substring(0, 45) + '...';

                html += `
                    <div class="msg-card ${unreadClass}" id="card_${msg.id}" onclick="toggleMessage('${msg.id}', ${msg.is_read})">
                        <div class="msg-header">
                            <div class="msg-title">
                                ${msg.title}
                                ${badgeHtml}
                            </div>
                            <div class="msg-date">${shamsiDate}</div>
                        </div>
                        <div class="msg-excerpt">${excerpt}</div>
                        <div class="msg-body">${msg.body}</div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        // ==========================================
        // 📖 باز کردن پیام و خوانده‌شده کردن آن
        // ==========================================
        async function toggleMessage(id, wasRead) {
            const cardEl = document.getElementById('card_' + id);
            
            // باز یا بسته کردن آکاردئون
            cardEl.classList.toggle('open');

            // اگر پیام قبلاً خوانده نشده بود، الان تو دیتابیس تیک آبی می‌زنیم
            if (!wasRead && !cardEl.dataset.markedRead) {
                try {
                    // تغییر ظاهر به صورت آنی (برای سرعت رابط کاربری)
                    cardEl.classList.remove('unread');
                    const badge = document.getElementById('badge_' + id);
                    if (badge) badge.style.display = 'none';
                    cardEl.dataset.markedRead = 'true'; // که دفعه بعد دوباره ریکوست نده

                    // ارسال درخواست به سرور در پس‌زمینه (آبدیت وضعیت به خوانده شده)
                    let cleanUrl = SUPABASE_URL.endsWith('/') ? SUPABASE_URL.slice(0, -1) : SUPABASE_URL;
                    await fetch(`${cleanUrl}/rest/v1/messages?id=eq.${id}`, {
                        method: 'PATCH',
                        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ is_read: true })
                    });
                    
                } catch (e) {
                    console.log("خطا در ثبت وضعیت خوانده شده:", e);
                }
            }
        }

        // ==========================================
        // 🌓 سیستم دارک مود
        // ==========================================
        const themeBtn = document.getElementById('themeBtn');
        if ((localStorage.getItem('theme') || 'light') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            if(themeBtn) themeBtn.innerText = '☀️';
        }

        function toggleTheme() {
            if (document.documentElement.getAttribute('data-theme') === 'dark') {
                document.documentElement.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
                if(themeBtn) themeBtn.innerText = '🌙';
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
                if(themeBtn) themeBtn.innerText = '☀️';
            }
        }
    </script>
</body>
</html>
