<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود | قطب‌نمای راهینو</title>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" />
    
    <style>
        :root { 
            --primary: #1e3a8a; /* سرمه‌ای عمیق */
            --accent: #d97706;  /* طلایی کهربایی */
            --bg-color: #f1f5f9; /* خاکستری-آبی ملایم */
            --surface: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --shadow: 0 20px 40px rgba(30, 58, 138, 0.15);
        }

        body { 
            background: var(--bg-color); color: var(--text-main); 
            min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px;
        }

        .login-box { 
            background: var(--surface); border-radius: 32px; padding: 50px 40px; 
            width: 100%; max-width: 420px; box-shadow: var(--shadow); 
            text-align: center;
        }

        /* 🖼️ استایل جدید لوگو */
        .logo-container {
            width: 140px; height: 140px; margin: 0 auto 25px auto;
            border-radius: 50%;
            background: var(--surface);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            border: 4px solid var(--surface);
        }
        .logo-img { width: 100%; height: 100%; object-fit: cover; }
        
        h1 { font-size: 26px; font-weight: 800; color: var(--primary); margin-bottom: 8px; }
        .subtitle { color: var(--text-muted); font-size: 15px; margin-bottom: 40px; }

        input { 
            width: 100%; padding: 18px; border-radius: 16px; 
            border: 2px solid var(--border); background: #f8fafc;
            font-size: 16px; margin-bottom: 20px; outline: none;
        }
        input:focus { border-color: var(--primary); }

        .btn-primary { 
            background: var(--primary); color: white; width: 100%; padding: 18px;
            border-radius: 16px; border: none; font-size: 17px; font-weight: bold; cursor: pointer;
        }
        .btn-primary:hover { background: #1e40af; }
    </style>
</head>
<body>

    <div class="login-box">
        <div class="logo-container">
            <!-- در اینجا لینک لوگوی جدیدت رو بذار -->
            <img src="لینک_لوگوی_جدید_راهینو.png" alt="لوگو" class="logo-img">
        </div>
        
        <h1>قطب‌نمای راهینو</h1>
        <p class="subtitle">مسیر موفقیتِ دکترِ آینده</p>

        <input type="text" id="userId" placeholder="آیدی عددی">
        <input type="password" id="userPass" placeholder="رمز عبور">

        <button class="btn-primary" onclick="handleLogin()">ورود به پنل</button>
    </div>

    <script>
        // ==========================================
        // 🔗 تنظیمات اتصال
        // ==========================================
        const SUPABASE_URL = 'https://etlutqwwqeahevsskjih.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0bHV0cXd3cWVhaGV2c3NramloIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MTYwNjIsImV4cCI6MjA5NzE5MjA2Mn0.kXvSQtGM7w28IffQ4JOtv_xtHenyDV0tC70bOd7N7nQ'; 
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyUy08rtBxcRePHokg_FT0s_8e6Qj5Y1CcQXE5F_H0oX5VTvO7VhCs_KTfRp6xlKtynbA/exec'; 

        // ==========================================
        // 🌓 سیستم دارک مود
        // ==========================================
        const themeBtn = document.getElementById('themeBtn');
        const currentTheme = localStorage.getItem('theme') || 'light';
        if (currentTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            themeBtn.innerText = '☀️';
        }

        function toggleTheme() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            if (isDark) {
                document.documentElement.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
                themeBtn.innerText = '🌙';
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
                themeBtn.innerText = '☀️';
            }
        }

        // ==========================================
        // 🚪 ورود به سیستم
        // ==========================================
        async function handleLogin() {
            const idInput = document.getElementById("userId").value.trim();
            const passInput = document.getElementById("userPass").value.trim();
            const btn = document.getElementById("loginBtn");
            const loader = document.getElementById("loginLoader");
            const errorMsg = document.getElementById("errorMsg");

            errorMsg.style.display = "none";
            if (!idInput || !passInput) return showError("لطفاً آیدی و رمز عبور را وارد کنید.");

            btn.disabled = true; loader.style.display = "block";

            try {
                let cleanUrl = SUPABASE_URL.endsWith('/') ? SUPABASE_URL.slice(0, -1) : SUPABASE_URL;
                const response = await fetch(`${cleanUrl}/rest/v1/students?chat_id=eq.${idInput}&select=*`, {
                    method: 'GET', headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
                });

                if (!response.ok) throw new Error("Network error");
                const users = await response.json();

                if (users.length === 0) {
                    showError("کاربری با این آیدی یافت نشد.");
                } else {
                    const user = users[0];
                    if (user.status === 'pending') {
                        showError("فیش شما در حال بررسی توسط مدیریت است.");
                    } else if (user.status !== 'active') {
                        showError("حساب کاربری شما فعال نیست.");
                    } else if (user.password !== passInput) {
                        showError("رمز عبور اشتباه است!");
                    } else {
                        localStorage.setItem('qotbnama_user_id', user.chat_id);
                        localStorage.setItem('qotbnama_full_name', user.full_name);
                        localStorage.setItem('qotbnama_role', user.role); 
                        localStorage.setItem('qotbnama_plan', user.plan_type); 
                        window.location.href = 'menu.html';
                    }
                }
            } catch (error) {
                showError("خطا در ارتباط با سرور.");
            }
            btn.disabled = false; loader.style.display = "none";
        }

        function showError(text) {
            const errorMsg = document.getElementById("errorMsg");
            errorMsg.innerText = "⚠️ " + text;
            errorMsg.style.display = "block";
        }

        // ==========================================
        // 🔑 سیستم مدال فراموشی رمز
        // ==========================================
        function openForgotModal() { 
            document.getElementById('forgotModal').style.display = 'flex'; 
        }
        
        function closeForgotModal() { 
            document.getElementById('forgotModal').style.display = 'none'; 
        }

        async function submitForgotPassword() {
            const nid = document.getElementById('forgotNid').value.trim();
            if(!nid) { alert("لطفاً کد ملی خود را وارد کنید."); return; }

            const btn = document.getElementById('btnForgotSend');
            btn.innerText = "در حال پردازش... ⏳";
            btn.disabled = true;

            try {
                // ارسال درخواست به گوگل بدون بلاک شدن توسط CORS در مرورگر
                fetch(`${GOOGLE_SCRIPT_URL}?action=forgot_password&national_id=${nid}`, { mode: 'no-cors' });
                
                setTimeout(() => {
                    alert("✅ درخواست ثبت شد. در صورتی که کد ملی شما در سیستم موجود باشد، آیدی و رمز عبور هم‌اکنون به ربات شما ارسال شد.");
                    closeForgotModal();
                    btn.innerText = "ارسال به ربات 🚀";
                    btn.disabled = false;
                }, 1500);

            } catch (e) {
                console.error(e);
                alert("مشکلی پیش آمد، لطفاً اینترنت خود را چک کنید.");
                btn.innerText = "ارسال به ربات 🚀";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
